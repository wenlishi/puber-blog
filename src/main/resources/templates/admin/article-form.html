<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写文章 - 知筑后台</title>
    <th:block th:replace="~{admin/layout :: adminStyles}"/>
    <!-- EasyMDE Markdown Editor -->
    <link href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet">
    <style>
        .editor-main { display: grid; grid-template-columns: minmax(0, 2fr) minmax(0, 1fr); gap: 24px; }
        .form-card { margin-bottom: 24px; }
        .form-label { display: block; font-size: 13.5px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
        .form-control, .form-select {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm); outline: none; font-size: 14px;
            background: var(--bg-surface); color: var(--text-regular);
            transition: border-color 0.2s;
        }
        .form-control:focus, .form-select:focus { border-color: var(--primary); }
        .form-text { font-size: 12.5px; color: var(--text-muted); margin-top: 6px; }
        .cover-preview { max-width: 300px; margin-top: 10px; border-radius: var(--radius-md); }
        .EasyMDEContainer { border: 1px solid var(--border-strong); border-radius: var(--radius-sm); overflow: hidden; }
        .EasyMDEContainer .editor-toolbar {
            border-bottom: 1px solid var(--border-light); background: var(--bg-body);
        }
        .EasyMDEContainer .editor-toolbar button {
            color: var(--text-regular) !important;
        }
        .EasyMDEContainer .editor-toolbar button:hover {
            background: var(--primary-light); border-color: var(--primary);
        }
        .EasyMDEContainer .CodeMirror {
            min-height: 500px; font-family: 'Consolas', 'Courier New', monospace; font-size: 14px;
            border: none; background: var(--bg-surface);
        }
        .EasyMDEContainer .editor-preview {
            background: var(--bg-surface); padding: 20px;
        }
        .EasyMDEContainer .editor-preview pre {
            background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: var(--radius-sm); overflow-x: auto;
        }
        .tag-checkbox {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; background: var(--bg-body); border-radius: var(--radius-sm);
            margin-right: 8px; margin-bottom: 8px; font-size: 13.5px; cursor: pointer;
            transition: all 0.2s;
        }
        .tag-checkbox:hover { background: var(--primary-light); }
        .tag-checkbox input[type="checkbox"] { accent-color: var(--primary); }
        .btn-group-custom { display: flex; gap: 8px; margin-top: 20px; }
        .upload-status {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            padding: 12px 20px; background: var(--bg-surface); border-radius: var(--radius-md);
            box-shadow: var(--shadow-card); display: none; align-items: center; gap: 8px;
            font-size: 13.5px; color: var(--text-regular);
        }
        .auto-save-status { font-size: 12.5px; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{admin/layout :: sidebar('article-form')}"></div>

    <!-- 主内容区 -->
    <main class="main-wrapper">
        <!-- 顶栏 -->
        <div th:replace="~{admin/layout :: topbar}"></div>

        <!-- 页面内容 -->
        <div class="content">
            <div class="page-header">
                <h1>写文章。</h1>
                <p>使用 Markdown 编辑器创作内容，支持实时预览。</p>
            </div>

            <!-- 上传进度提示 -->
            <div id="upload-progress" class="upload-status">
                <i class="ph-bold ph-upload-simple" style="color: var(--primary);"></i>
                <span id="upload-status">上传中...</span>
            </div>

            <!-- 自动保存状态 -->
            <div class="auto-save-status">
                <i class="ph-bold ph-cloud-check" style="color: var(--primary);"></i>
                <span id="save-status">自动保存已开启</span>
            </div>

            <div class="editor-main">
                <!-- 左侧：编辑器 -->
                <div>
                    <div class="card form-card">
                        <div class="card-body">
                            <!-- 文章标题 -->
                            <div class="mb-3">
                                <label for="title" class="form-label">文章标题 <span style="color: var(--primary);">*</span></label>
                                <input type="text" class="form-control" id="title" required placeholder="请输入文章标题">
                            </div>

                            <!-- 文章别名（slug） -->
                            <div class="mb-3">
                                <label for="slug" class="form-label">别名（Slug）</label>
                                <input type="text" class="form-control" id="slug" placeholder="可选，用于 URL">
                                <div class="form-text">如果不填写，系统会自动根据标题生成</div>
                            </div>

                            <!-- Markdown 编辑器 -->
                            <div class="mb-3">
                                <label for="content" class="form-label">文章内容（Markdown） <span style="color: var(--primary);">*</span></label>
                                <textarea id="content"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧：设置面板 -->
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <!-- 发布设置 -->
                    <div class="card form-card">
                        <div class="card-header">
                            <div class="card-title-text">发布设置</div>
                        </div>
                        <div class="card-body" style="display: flex; flex-direction: column; gap: 16px;">
                            <div>
                                <label for="status" class="form-label">状态</label>
                                <select class="form-select" id="status">
                                    <option value="PUBLISHED">已发布</option>
                                    <option value="DRAFT">草稿</option>
                                </select>
                            </div>
                            <div>
                                <label for="categoryId" class="form-label">分类</label>
                                <select class="form-select" id="categoryId">
                                    <option value="">无分类</option>
                                </select>
                            </div>
                            <div>
                                <label class="form-label">标签</label>
                                <div id="tagCheckboxes" style="display: flex; flex-wrap: wrap;">
                                    <div class="form-text">暂无标签，请先在标签管理中创建</div>
                                </div>
                                <div style="margin-top: 12px; display: flex; gap: 8px;">
                                    <input type="text" class="form-control" id="newTagInput" placeholder="输入新标签名称" style="flex: 1;">
                                    <button type="button" class="btn-primary-custom" onclick="addNewTag()">
                                        <i class="ph-bold ph-plus"></i> 添加
                                    </button>
                                </div>
                            </div>
                            <div>
                                <label for="pinned" class="form-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                    <input type="checkbox" id="pinned" style="accent-color: var(--primary);">
                                    置顶文章
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 封面图片 -->
                    <div class="card form-card">
                        <div class="card-header">
                            <div class="card-title-text">封面图片</div>
                        </div>
                        <div class="card-body">
                            <input type="file" class="form-control" id="coverImageFile" accept="image/*" onchange="uploadCoverImage()">
                            <input type="hidden" id="coverImage">
                            <img id="coverImagePreview" class="cover-preview" style="display:none;">
                            <div class="form-text">建议尺寸：1200x630 像素</div>
                        </div>
                    </div>

                    <!-- 文章摘要 -->
                    <div class="card form-card">
                        <div class="card-header">
                            <div class="card-title-text">文章摘要</div>
                        </div>
                        <div class="card-body">
                            <textarea class="form-control" id="summary" rows="3" placeholder="简要描述文章内容..."></textarea>
                            <button type="button" class="btn-outline-custom btn-sm-custom" onclick="generateSummary()" style="margin-top: 8px;">
                                <i class="ph-bold ph-magic-wand"></i> 自动生成摘要
                            </button>
                            <div class="form-text">留空则自动提取文章前 100 字</div>
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="btn-group-custom">
                        <button type="button" class="btn-primary-custom" onclick="saveArticle()" style="flex: 1; justify-content: center;">
                            <i class="ph-bold ph-floppy-disk"></i> 保存文章
                        </button>
                        <a href="/admin/articles" class="btn-outline-custom btn-sm-custom" style="padding: 8px 20px;">
                            <i class="ph-bold ph-arrow-left"></i> 返回
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{admin/layout :: adminScripts}"/>
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        let easyMDE;
        let autoSaveTimer;

        // 初始化编辑器
        document.addEventListener('DOMContentLoaded', function() {
            easyMDE = new EasyMDE({
                element: document.getElementById('content'),
                spellChecker: false,
                autosave: { enabled: true, uniqueId: 'article_content', delay: 1000 },
                toolbar: [
                    'bold', 'italic', 'strikethrough', 'heading', '|',
                    'quote', 'code', 'link', 'image', 'table', '|',
                    'unordered-list', 'ordered-list', '|',
                    'preview', 'side-by-side', 'fullscreen', '|',
                    'guide'
                ],
                placeholder: '开始写作吧...',
                renderingConfig: {
                    highlightCallback: function(code_block) {
                        hljs.highlightAll();
                    }
                }
            });

            loadCategoriesAndTags();
            loadArticleIfNeeded();
            
            // 自动保存监听
            document.getElementById('title').addEventListener('input', triggerAutoSave);
            document.getElementById('slug').addEventListener('input', triggerAutoSave);
            document.getElementById('summary').addEventListener('input', triggerAutoSave);
        });

        function loadCategoriesAndTags() {
            fetch('/admin/api/categories')
                .then(response => response.json())
                .then(result => {
                    const categories = result.data || result;
                    if (!Array.isArray(categories)) return;
                    const select = document.getElementById('categoryId');
                    categories.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.name;
                        select.appendChild(option);
                    });
                })
                .catch(error => console.error('Error loading categories:', error));

            fetch('/admin/api/tags')
                .then(response => response.json())
                .then(result => {
                    const tags = result.data || result;
                    if (!Array.isArray(tags)) return;
                    const container = document.getElementById('tagCheckboxes');
                    if (tags && tags.length > 0) {
                        container.innerHTML = tags.map(tag => `
                            <label class="tag-checkbox">
                                <input type="checkbox" name="tags" value="${tag.id}">
                                <span>${tag.name}</span>
                            </label>
                        `).join('');
                    }
                })
                .catch(error => console.error('Error loading tags:', error));
        }

        function loadArticleIfNeeded() {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');
            if (articleId) {
                fetch(`/admin/articles/api/${articleId}`)
                    .then(response => response.json())
                    .then(article => {
                        document.getElementById('articleId').value = article.id;
                        document.getElementById('title').value = article.title;
                        document.getElementById('slug').value = article.slug || '';
                        document.getElementById('summary').value = article.summary || '';
                        document.getElementById('coverImage').value = article.coverImage || '';
                        document.getElementById('status').value = article.status;
                        document.getElementById('categoryId').value = article.categoryId || '';
                        document.getElementById('pinned').checked = article.pinned;
                        easyMDE.value(article.content);
                        
                        if (article.coverImage) {
                            const preview = document.getElementById('coverImagePreview');
                            preview.src = article.coverImage;
                            preview.style.display = 'block';
                        }
                        
                        // 选中标签
                        if (article.tags) {
                            document.querySelectorAll('input[name="tags"]').forEach(cb => {
                                cb.checked = article.tags.some(t => t.id === parseInt(cb.value));
                            });
                        }
                        
                        document.getElementById('pageTitle').textContent = '编辑文章';
                    });
            }
        }

        function uploadCoverImage() {
            const fileInput = document.getElementById('coverImageFile');
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            document.getElementById('upload-progress').style.display = 'flex';

            fetch('/admin/api/upload/image', {
                method: 'POST',
                headers: {
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('coverImage').value = data.url;
                const preview = document.getElementById('coverImagePreview');
                preview.src = data.url;
                preview.style.display = 'block';
                document.getElementById('upload-progress').style.display = 'none';
            })
            .catch(error => {
                console.error('Error:', error);
                alert('上传失败，请重试');
                document.getElementById('upload-progress').style.display = 'none';
            });
        }

        function generateSummary() {
            const content = easyMDE.value();
            const summary = content.substring(0, 200).replace(/[#*`]/g, '') + '...';
            document.getElementById('summary').value = summary;
            triggerAutoSave();
        }

        function addNewTag() {
            const tagName = document.getElementById('newTagInput').value.trim();
            if (!tagName) return;

            fetch('/admin/api/tags', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                },
                body: JSON.stringify({ name: tagName })
            })
            .then(response => response.json())
            .then(tag => {
                const container = document.getElementById('tagCheckboxes');
                const label = document.createElement('label');
                label.className = 'tag-checkbox';
                label.innerHTML = `
                    <input type="checkbox" name="tags" value="${tag.id}" checked>
                    <span>${tag.name}</span>
                `;
                container.appendChild(label);
                document.getElementById('newTagInput').value = '';
            });
        }

        function triggerAutoSave() {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                document.getElementById('save-status').innerHTML = '<i class="ph-bold ph-cloud-arrow-up"></i> 正在保存...';
                // 可以在这里添加实际的保存逻辑
            }, 1000);
        }

        function saveArticle() {
            const title = document.getElementById('title').value.trim();
            const content = easyMDE.value().trim();

            if (!title) {
                alert('请输入文章标题');
                return;
            }
            if (!content) {
                alert('请输入文章内容');
                return;
            }

            const articleId = document.getElementById('articleId').value;
            const selectedTags = Array.from(document.querySelectorAll('input[name="tags"]:checked')).map(cb => parseInt(cb.value));

            const articleData = {
                title: title,
                slug: document.getElementById('slug').value.trim(),
                summary: document.getElementById('summary').value.trim(),
                content: content,
                coverImage: document.getElementById('coverImage').value,
                status: document.getElementById('status').value,
                categoryId: document.getElementById('categoryId').value ? parseInt(document.getElementById('categoryId').value) : null,
                tagIds: selectedTags,
                isTop: document.getElementById('pinned').checked
            };

            const url = articleId ? `/admin/articles/${articleId}` : '/admin/articles';
            const method = articleId ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                },
                body: JSON.stringify(articleData)
            })
            .then(response => {
                if (response.ok) {
                    alert('保存成功！');
                    if (!articleId) {
                        window.location.href = '/admin/articles';
                    }
                } else {
                    alert('保存失败，请重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('保存失败，请重试');
            });
        }
    </script>
</body>
</html>
