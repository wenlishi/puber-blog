<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章编辑 - puber-blog后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- EasyMDE Markdown Editor -->
    <link href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css" rel="stylesheet">
    <!-- Highlight.js for code syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .EasyMDEContainer { max-width: 100%; }
        .editor-toolbar { border-color: #dee2e6; }
        .cover-preview { max-width: 300px; margin-top: 10px; }
        .tag-checkbox { margin-right: 10px; }
        /* 预览区样式优化 */
        .EasyMDEContainer .editor-preview {
            padding: 20px;
            background: #fff;
        }
        .EasyMDEContainer .editor-preview pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .EasyMDEContainer .editor-preview code {
            font-family: 'Consolas', 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{admin/fragments :: navbar('articles')}"></div>

    <!-- 主内容 -->
    <div class="container mt-4">
        <!-- 上传进度提示 -->
        <div id="upload-progress" class="alert alert-info" style="display:none; position:fixed; top:20px; right:20px; z-index:9999;">
            <i class="bi bi-upload"></i> <span id="upload-status">上传中...</span>
        </div>

        <!-- 自动保存状态指示器 -->
        <div id="auto-save-indicator" class="text-muted small mb-2" style="display:block;">
            <i class="bi bi-cloud-check"></i> <span id="save-status">自动保存已开启</span>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0" id="pageTitle"><i class="bi bi-file-text"></i> 新增文章</h5>
            </div>
            <div class="card-body">
                <form id="articleForm">
                    <input type="hidden" id="articleId">

                    <!-- 文章标题 -->
                    <div class="mb-3">
                        <label for="title" class="form-label">文章标题 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" required>
                    </div>

                    <!-- 文章别名（slug） -->
                    <div class="mb-3">
                        <label for="slug" class="form-label">别名（Slug）</label>
                        <input type="text" class="form-control" id="slug">
                        <div class="form-text">如果不填写，系统会自动根据标题生成</div>
                    </div>

                    <!-- 封面图片 -->
                    <div class="mb-3">
                        <label for="coverImage" class="form-label">封面图片</label>
                        <input type="file" class="form-control" id="coverImageFile" accept="image/*" onchange="uploadCoverImage()">
                        <input type="hidden" id="coverImage">
                        <img id="coverImagePreview" class="cover-preview" style="display:none;">
                    </div>

                    <!-- 文章摘要 -->
                    <div class="mb-3">
                        <label for="summary" class="form-label">文章摘要</label>
                        <textarea class="form-control" id="summary" rows="2"></textarea>
                        <button type="button" class="btn btn-sm btn-outline-secondary mt-1" onclick="generateSummary()">自动生成摘要</button>
                    </div>

                    <!-- Markdown编辑器 -->
                    <div class="mb-3">
                        <label for="content" class="form-label">文章内容（Markdown） <span class="text-danger">*</span></label>
                        <textarea id="content"></textarea>
                    </div>

                    <!-- 分类选择 -->
                    <div class="mb-3">
                        <label for="categoryId" class="form-label">分类</label>
                        <select class="form-select" id="categoryId">
                            <option value="">无分类</option>
                        </select>
                    </div>

                    <!-- 标签选择 -->
                    <div class="mb-3">
                        <label class="form-label">标签</label>
                        <div id="tagContainer"></div>
                    </div>

                    <!-- 文章状态 -->
                    <div class="mb-3">
                        <label class="form-label">文章状态</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="status" id="statusDraft" value="DRAFT">
                            <label class="form-check-label" for="statusDraft">草稿</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="status" id="statusPublished" value="PUBLISHED" checked>
                            <label class="form-check-label" for="statusPublished">发布</label>
                        </div>
                    </div>

                    <!-- 置顶设置 -->
                    <div class="mb-3 form-check">
                        <input class="form-check-input" type="checkbox" id="isTop">
                        <label class="form-check-label" for="isTop">置顶文章</label>
                    </div>

                    <!-- 评论设置 -->
                    <div class="mb-3 form-check">
                        <input class="form-check-input" type="checkbox" id="isCommentEnabled" checked>
                        <label class="form-check-label" for="isCommentEnabled">允许评论</label>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="mb-3">
                        <button type="button" class="btn btn-secondary" onclick="saveDraft()"><i class="bi bi-save"></i> 保存草稿</button>
                        <button type="button" class="btn btn-primary" onclick="publishArticle()"><i class="bi bi-send"></i> 发布文章</button>
                        <a class="btn btn-outline-secondary" href="/admin/articles"><i class="bi bi-arrow-left"></i> 返回列表</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- EasyMDE Markdown Editor -->
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <!-- Highlight.js for code syntax highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <script>
        let articleId = null;
        let easyMDE;
        let autoSaveTimer;
        let lastContentHash = '';
        let hasUnsavedChangesFlag = false;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化Markdown编辑器
            easyMDE = new EasyMDE({
                element: document.getElementById('content'),
                spellChecker: false,
                autosave: { enabled: false },
                placeholder: "在此编写文章内容（支持Markdown格式）...",
                uploadImage: true,
                imageUploadFunction: function(file, onSuccess, onError) {
                    // 显示上传提示
                    showUploadProgress('上传中...');

                    const formData = new FormData();
                    formData.append('file', file);

                    fetch('/api/admin/articles/upload-image', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.code === 200) {
                            onSuccess(data.data);
                            showUploadProgress('上传成功');
                            setTimeout(() => hideUploadProgress(), 2000);
                        } else {
                            onError(data.message || '上传失败');
                            showUploadProgress('上传失败：' + (data.message || '未知错误'));
                            setTimeout(() => hideUploadProgress(), 3000);
                        }
                    })
                    .catch(error => {
                        onError('网络错误');
                        showUploadProgress('上传失败：网络错误');
                        setTimeout(() => hideUploadProgress(), 3000);
                    });
                },
                previewRender: function(plainText, preview) {
                    // 使用 EasyMDE 内置的 marked.js 渲染 Markdown
                    const renderedHtml = marked.parse(plainText);
                    preview.innerHTML = renderedHtml;

                    // 应用代码高亮
                    setTimeout(() => {
                        preview.querySelectorAll('pre code').forEach((block) => {
                            hljs.highlightElement(block);
                        });
                    }, 0);

                    return renderedHtml;
                },
                toolbar: [
                    "bold", "italic", "heading", "|",
                    "quote", "unordered-list", "ordered-list", "|",
                    "link", "image", "code", "|",
                    "preview", "side-by-side", "fullscreen", "|",
                    "guide"
                ]
            });

            // 加载分类和标签列表
            loadCategories();
            loadTags();

            // 检查URL中的文章ID（编辑模式）
            const urlPath = window.location.pathname;
            const match = urlPath.match(/\/admin\/articles\/(\d+)\/edit/);
            if (match) {
                articleId = match[1];
                document.getElementById('pageTitle').innerHTML = '<i class="bi bi-pencil"></i> 编辑文章';
                loadArticleData(articleId);
            }

            // 启动自动保存
            startAutoSave();

            // 监听页面离开事件
            window.addEventListener('beforeunload', function(e) {
                if (hasUnsavedChanges()) {
                    e.preventDefault();
                    e.returnValue = '有未保存的内容，确定离开吗？';
                }
            });
        });

        // 加载分类列表
        function loadCategories() {
            fetch('/api/admin/categories')
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200 && data.data) {
                        const select = document.getElementById('categoryId');
                        data.data.forEach(category => {
                            const option = document.createElement('option');
                            option.value = category.id;
                            option.textContent = category.name;
                            select.appendChild(option);
                        });
                    }
                });
        }

        // 加载标签列表
        function loadTags() {
            fetch('/api/admin/tags')
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200 && data.data) {
                        const container = document.getElementById('tagContainer');
                        container.innerHTML = data.data.map(tag => `
                            <div class="form-check form-check-inline">
                                <input class="form-check-input tag-checkbox" type="checkbox" id="tag_${tag.id}" value="${tag.id}">
                                <label class="form-check-label" for="tag_${tag.id}">${tag.name}</label>
                            </div>
                        `).join('');
                    }
                });
        }

        // 加载文章数据（编辑模式）
        function loadArticleData(id) {
            fetch(`/api/admin/articles/${id}`)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200 && data.data) {
                        const article = data.data;
                        document.getElementById('articleId').value = article.id;
                        document.getElementById('title').value = article.title;
                        document.getElementById('slug').value = article.slug;
                        document.getElementById('summary').value = article.summary || '';
                        document.getElementById('coverImage').value = article.coverImage || '';

                        // 设置封面图片预览
                        if (article.coverImage) {
                            document.getElementById('coverImagePreview').src = article.coverImage;
                            document.getElementById('coverImagePreview').style.display = 'block';
                        }

                        // 设置Markdown内容
                        easyMDE.value(article.contentMarkdown);

                        // 设置分类
                        if (article.category) {
                            document.getElementById('categoryId').value = article.category.id;
                        }

                        // 设置标签
                        if (article.tags) {
                            article.tags.forEach(tag => {
                                const checkbox = document.getElementById(`tag_${tag.id}`);
                                if (checkbox) checkbox.checked = true;
                            });
                        }

                        // 设置状态
                        document.getElementById('statusPublished').checked = article.status === 'PUBLISHED';
                        document.getElementById('statusDraft').checked = article.status === 'DRAFT';

                        // 设置置顶和评论
                        document.getElementById('isTop').checked = article.isTop;
                        document.getElementById('isCommentEnabled').checked = article.isCommentEnabled;
                    } else {
                        showError(data.message || '加载文章数据失败');
                    }
                });
        }

        // 上传封面图片
        function uploadCoverImage() {
            const fileInput = document.getElementById('coverImageFile');
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            fetch('/api/admin/articles/upload-cover', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200) {
                        document.getElementById('coverImage').value = data.data;
                        document.getElementById('coverImagePreview').src = data.data;
                        document.getElementById('coverImagePreview').style.display = 'block';
                        showSuccess('封面图片上传成功');
                    } else {
                        showError(data.message || '上传失败');
                    }
                });
        }

        // 自动生成摘要
        function generateSummary() {
            const content = easyMDE.value();
            if (!content) { showError('请先填写文章内容'); return; }

            // 提取前200个字符作为摘要
            const summary = content.substring(0, 200).replace(/[#*`_\[\]]/g, '').trim();
            document.getElementById('summary').value = summary;
            showSuccess('摘要已生成');
        }

        // 收集表单数据
        function collectFormData() {
            const title = document.getElementById('title').value.trim();
            if (!title) { showError('标题不能为空'); return null; }

            const tagIds = [];
            document.querySelectorAll('.tag-checkbox:checked').forEach(cb => {
                tagIds.push(parseInt(cb.value));
            });

            return {
                title: title,
                slug: document.getElementById('slug').value.trim(),
                summary: document.getElementById('summary').value.trim(),
                content: easyMDE.value(),
                coverImage: document.getElementById('coverImage').value,
                status: document.querySelector('input[name="status"]:checked').value,
                isTop: document.getElementById('isTop').checked,
                isCommentEnabled: document.getElementById('isCommentEnabled').checked,
                categoryId: document.getElementById('categoryId').value ? parseInt(document.getElementById('categoryId').value) : null,
                tagIds: tagIds
            };
        }

        // 保存草稿
        function saveDraft() {
            const data = collectFormData();
            if (!data) return;
            data.status = 'DRAFT';
            saveArticle(data);
        }

        // 发布文章
        function publishArticle() {
            const data = collectFormData();
            if (!data) return;
            data.status = 'PUBLISHED';
            saveArticle(data);
        }

        // 保存文章
        function saveArticle(data) {
            const url = articleId ? `/api/admin/articles/${articleId}` : '/api/admin/articles';
            const method = articleId ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(response => response.json())
                .then(result => {
                    if (result.code === 200) {
                        showSuccess(articleId ? '文章已更新' : '文章已创建');
                        // 标记内容已保存，避免离开提示
                        lastContentHash = getContentHash();
                        hasUnsavedChangesFlag = false;
                        window.location.href = '/admin/articles';
                    } else {
                        showError(result.message || '保存失败');
                    }
                });
        }

        function showSuccess(message) { alert(message); }
        function showError(message) { alert('错误：' + message); }

        // 上传进度提示相关函数
        function showUploadProgress(status) {
            const progressDiv = document.getElementById('upload-progress');
            const statusSpan = document.getElementById('upload-status');
            statusSpan.textContent = status;
            progressDiv.style.display = 'block';
        }

        function hideUploadProgress() {
            const progressDiv = document.getElementById('upload-progress');
            progressDiv.style.display = 'none';
        }

        // 自动保存相关函数
        function startAutoSave() {
            autoSaveTimer = setInterval(() => {
                const currentHash = getContentHash();
                if (currentHash !== lastContentHash) {
                    autoSaveDraft();
                    lastContentHash = currentHash;
                }
            }, 30000); // 30秒检查一次
        }

        function getContentHash() {
            return JSON.stringify({
                title: document.getElementById('title').value,
                content: easyMDE.value(),
                summary: document.getElementById('summary').value
            });
        }

        function autoSaveDraft() {
            const data = collectFormData();
            if (!data) return;

            // 如果是新文章，不设置ID
            if (!articleId) {
                data.id = null;
            }

            const url = '/api/admin/articles/auto-save';
            const method = 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.code === 200) {
                    const savedAt = result.data.savedAt;
                    const savedId = result.data.id;

                    // 更新文章ID（如果是新创建的）
                    if (!articleId && savedId) {
                        articleId = savedId;
                        document.getElementById('articleId').value = savedId;
                    }

                    updateAutoSaveStatus('已自动保存 ' + formatTime(savedAt));
                    hasUnsavedChangesFlag = false;
                } else {
                    updateAutoSaveStatus('自动保存失败');
                }
            })
            .catch(error => {
                updateAutoSaveStatus('自动保存失败：网络错误');
            });
        }

        function updateAutoSaveStatus(status) {
            const statusSpan = document.getElementById('save-status');
            statusSpan.textContent = status;
        }

        function formatTime(dateTime) {
            // 简单的时间格式化
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            return `${hours}:${minutes < 10 ? '0' + minutes : minutes}`;
        }

        function hasUnsavedChanges() {
            const currentHash = getContentHash();
            return currentHash !== lastContentHash && currentHash !== '{}';
        }
    </script>
</body>
</html>
