<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - 知筑后台</title>
    <th:block th:replace="~{admin/layout :: adminStyles}"/>
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{admin/layout :: sidebar('articles')}"></div>

    <!-- 主内容区 -->
    <main class="main-wrapper">
        <!-- 顶栏 -->
        <div th:replace="~{admin/layout :: topbar}"></div>

        <!-- 页面内容 -->
        <div class="content">
            <div class="page-header">
                <h1>文章管理。</h1>
                <p>管理所有文章，包括发布、编辑、删除等操作。</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title-text">文章列表</div>
                    <a class="btn-primary-custom" href="/admin/articles/new">
                        <i class="ph-bold ph-plus"></i> 新增文章
                    </a>
                </div>
                <div class="card-body">
                    <!-- 状态筛选和搜索 -->
                    <div style="display: flex; gap: 16px; margin-bottom: 20px; align-items: center;">
                        <div class="btn-group" role="group">
                            <button type="button" class="btn-primary-custom" onclick="filterByStatus('ALL')">全部</button>
                            <button type="button" class="btn-outline-custom btn-sm-custom" onclick="filterByStatus('PUBLISHED')">已发布</button>
                            <button type="button" class="btn-outline-custom btn-sm-custom" onclick="filterByStatus('DRAFT')">草稿</button>
                        </div>
                        <div style="flex: 1; display: flex; gap: 8px;">
                            <input type="text" class="form-control" id="searchKeyword" placeholder="搜索文章标题..." 
                                   style="flex: 1; padding: 8px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); outline: none; font-size: 14px;">
                            <button class="btn-outline-custom btn-sm-custom" onclick="searchArticles()">
                                <i class="ph-bold ph-magnifying-glass"></i> 搜索
                            </button>
                        </div>
                    </div>

                    <!-- 加载提示 -->
                    <div id="loadingSpinner" class="text-center py-4" style="text-align: center; padding: 40px;">
                        <div class="spinner-border" style="color: var(--primary); width: 40px; height: 40px; border-width: 3px;" role="status"></div>
                        <p style="margin-top: 16px; color: var(--text-muted);">加载中...</p>
                    </div>

                    <!-- 文章表格 -->
                    <table class="table-custom" id="articleTable" style="display:none;">
                        <thead>
                            <tr>
                                <th width="50">ID</th>
                                <th>标题</th>
                                <th width="80">状态</th>
                                <th width="60">置顶</th>
                                <th width="80">浏览量</th>
                                <th width="120">分类</th>
                                <th width="150">标签</th>
                                <th width="120">发布时间</th>
                                <th width="150">操作</th>
                            </tr>
                        </thead>
                        <tbody id="articleTableBody"></tbody>
                    </table>

                    <!-- 空数据提示 -->
                    <div id="emptyMessage" class="text-center py-4" style="display:none; text-align: center; padding: 40px;">
                        <i class="ph ph-inbox" style="font-size:48px;color:#ccc;"></i>
                        <p style="margin-top: 16px; color: var(--text-muted);">暂无文章数据</p>
                    </div>

                    <!-- 分页 -->
                    <nav id="pagination" style="display:none; margin-top: 20px;">
                        <ul class="pagination justify-content-center" id="paginationList" 
                            style="display: flex; list-style: none; gap: 8px; justify-content: center; padding: 0; margin: 0;"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>

    <!-- 删除确认对话框 -->
    <div class="modal fade" id="deleteModal" tabindex="-1" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-dialog" style="background: white; border-radius: var(--radius-lg); padding: 24px; max-width: 400px; width: 90%;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light);">
                <h5 class="modal-title" style="color: var(--text-main); font-size: 16px; font-weight: 600;">
                    <i class="ph-bold ph-warning" style="color: var(--primary);"></i> 删除确认
                </h5>
                <button type="button" class="btn-close" onclick="closeDeleteModal()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted);">&times;</button>
            </div>
            <div class="modal-body" style="margin-bottom: 20px;">
                <p style="color: var(--text-regular); margin-bottom: 8px;">确定要删除文章 <strong id="deleteArticleTitle" style="color: var(--primary);"></strong> 吗？</p>
                <p style="color: var(--text-muted); font-size: 13px; margin: 0;">删除后无法恢复</p>
            </div>
            <div class="modal-footer" style="display: flex; gap: 8px; justify-content: flex-end;">
                <button type="button" class="btn-outline-custom btn-sm-custom" onclick="closeDeleteModal()">取消</button>
                <button type="button" class="btn-primary-custom" onclick="confirmDelete()" style="background: #DC3545;">
                    <i class="ph-bold ph-trash"></i> 确认删除
                </button>
            </div>
        </div>
    </div>

    <th:block th:replace="~{admin/layout :: adminScripts}"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 文章管理相关 JavaScript
        let currentFilter = 'ALL';
        let currentPage = 1;
        let totalPages = 1;
        let articleToDelete = null;

        function filterByStatus(status) {
            currentFilter = status;
            currentPage = 1;
            loadArticles();
            
            // 更新按钮状态
            document.querySelectorAll('.btn-group button').forEach(btn => {
                btn.classList.remove('btn-primary-custom');
                btn.classList.add('btn-outline-custom', 'btn-sm-custom');
            });
            event.target.classList.remove('btn-outline-custom', 'btn-sm-custom');
            event.target.classList.add('btn-primary-custom');
        }

        function searchArticles() {
            const keyword = document.getElementById('searchKeyword').value;
            loadArticles(keyword);
        }

        function loadArticles(keyword = '') {
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('articleTable').style.display = 'none';
            document.getElementById('emptyMessage').style.display = 'none';
            document.getElementById('pagination').style.display = 'none';

            const url = `/admin/articles/api?status=${currentFilter}&page=${currentPage}&keyword=${encodeURIComponent(keyword)}`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loadingSpinner').style.display = 'none';
                    
                    if (data.articles && data.articles.length > 0) {
                        renderArticles(data.articles);
                        document.getElementById('articleTable').style.display = 'table';
                        if (data.totalPages > 1) {
                            renderPagination(data.currentPage, data.totalPages);
                            document.getElementById('pagination').style.display = 'block';
                        }
                    } else {
                        document.getElementById('emptyMessage').style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('loadingSpinner').style.display = 'none';
                    document.getElementById('emptyMessage').style.display = 'block';
                });
        }

        function renderArticles(articles) {
            const tbody = document.getElementById('articleTableBody');
            tbody.innerHTML = articles.map(article => `
                <tr>
                    <td style="color: var(--text-muted);">${article.id}</td>
                    <td>
                        <a href="/admin/articles/${article.id}/edit" style="color: var(--text-main); font-weight: 500; text-decoration: none;">
                            ${article.title}
                        </a>
                    </td>
                    <td>
                        ${article.status === 'PUBLISHED' 
                            ? '<span class="badge badge-success"><i class="ph-bold ph-check"></i> 已发布</span>'
                            : '<span class="badge badge-secondary"><i class="ph-bold ph-file"></i> 草稿</span>'
                        }
                    </td>
                    <td>
                        ${article.pinned 
                            ? '<span class="badge badge-info"><i class="ph-bold ph-push-pin"></i></span>'
                            : '<span style="color: var(--text-muted);">-</span>'
                        }
                    </td>
                    <td style="color: var(--text-muted);">${article.viewCount || 0}</td>
                    <td style="color: var(--text-muted);">${article.categoryName || '-'}</td>
                    <td style="color: var(--text-muted);">${article.tags ? article.tags.map(t => t.name).join(', ') : '-'}</td>
                    <td style="color: var(--text-muted);">${article.publishedAt ? new Date(article.publishedAt).toLocaleDateString('zh-CN') : '-'}</td>
                    <td>
                        <a href="/admin/articles/${article.id}/edit" class="btn-outline-custom btn-sm-custom" style="margin-right: 4px;">
                            <i class="ph-bold ph-pencil"></i> 编辑
                        </a>
                        <button onclick="showDeleteModal(${article.id}, '${article.title}')" class="btn-outline-custom btn-sm-custom" style="border-color: #DC3545; color: #DC3545;">
                            <i class="ph-bold ph-trash"></i> 删除
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function renderPagination(current, total) {
            const paginationList = document.getElementById('paginationList');
            let html = '';
            
            if (current > 1) {
                html += `<li><button class="btn-outline-custom btn-sm-custom" onclick="goToPage(${current - 1})">上一页</button></li>`;
            }
            
            for (let i = Math.max(1, current - 2); i <= Math.min(total, current + 2); i++) {
                html += `<li><button class="btn-sm-custom ${i === current ? 'btn-primary-custom' : 'btn-outline-custom'}" onclick="goToPage(${i})">${i}</button></li>`;
            }
            
            if (current < total) {
                html += `<li><button class="btn-outline-custom btn-sm-custom" onclick="goToPage(${current + 1})">下一页</button></li>`;
            }
            
            paginationList.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            loadArticles(document.getElementById('searchKeyword').value);
        }

        function showDeleteModal(id, title) {
            articleToDelete = id;
            document.getElementById('deleteArticleTitle').textContent = title;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        function closeDeleteModal() {
            articleToDelete = null;
            document.getElementById('deleteModal').style.display = 'none';
        }

        function confirmDelete() {
            if (articleToDelete) {
                fetch(`/admin/articles/${articleToDelete}`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                    }
                })
                .then(response => {
                    if (response.ok) {
                        closeDeleteModal();
                        loadArticles();
                    } else {
                        alert('删除失败，请重试');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('删除失败，请重试');
                });
            }
        }

        // 页面加载时获取文章列表
        document.addEventListener('DOMContentLoaded', function() {
            loadArticles();
        });

        // 点击模态框外部关闭
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDeleteModal();
            }
        });
    </script>
</body>
</html>
