<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理 - 知筑后台</title>
    <th:block th:replace="~{admin/layout :: adminStyles}"/>
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{admin/layout :: sidebar('categories')}"></div>

    <!-- 主内容区 -->
    <main class="main-wrapper">
        <!-- 顶栏 -->
        <div th:replace="~{admin/layout :: topbar}"></div>

        <!-- 页面内容 -->
        <div class="content">
            <div class="page-header">
                <h1>分类与标签。</h1>
                <p>管理文章分类和标签，组织内容结构。</p>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <!-- 分类管理 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title-text">分类管理</div>
                        <button class="btn-primary-custom" onclick="showCategoryModal()">
                            <i class="ph-bold ph-plus"></i> 新增分类
                        </button>
                    </div>
                    <div class="card-body">
                        <table class="table-custom" th:if="${categories != null and categories.size() > 0}">
                            <thead>
                                <tr>
                                    <th width="50">ID</th>
                                    <th>名称</th>
                                    <th width="80">文章数</th>
                                    <th width="120">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="category : ${categories}">
                                    <td style="color: var(--text-muted);" th:text="${category.id}">1</td>
                                    <td>
                                        <span style="font-weight: 500; color: var(--text-main);" th:text="${category.name}">分类名称</span>
                                    </td>
                                    <td style="color: var(--text-muted);" th:text="${category.articleCount}">0</td>
                                    <td>
                                        <button th:onclick="'showEditCategoryModal(' + ${category.id} + ', \'' + ${category.name} + '\')'" 
                                                class="btn-outline-custom btn-sm-custom" style="margin-right: 4px;">
                                            <i class="ph-bold ph-pencil"></i> 编辑
                                        </button>
                                        <button th:onclick="'deleteCategory(' + ${category.id} + ')'" 
                                                class="btn-outline-custom btn-sm-custom" style="border-color: #DC3545; color: #DC3545;">
                                            <i class="ph-bold ph-trash"></i> 删除
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div th:if="${categories == null or categories.size() == 0}" class="text-center py-4" style="text-align: center; padding: 40px;">
                            <i class="ph ph-inbox" style="font-size:48px;color:#ccc;"></i>
                            <p style="margin-top: 16px; color: var(--text-muted);">暂无分类</p>
                        </div>
                    </div>
                </div>

                <!-- 标签管理 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title-text">标签管理</div>
                        <button class="btn-primary-custom" onclick="showTagModal()">
                            <i class="ph-bold ph-plus"></i> 新增标签
                        </button>
                    </div>
                    <div class="card-body">
                        <table class="table-custom" th:if="${tags != null and tags.size() > 0}">
                            <thead>
                                <tr>
                                    <th width="50">ID</th>
                                    <th>名称</th>
                                    <th width="80">文章数</th>
                                    <th width="120">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="tag : ${tags}">
                                    <td style="color: var(--text-muted);" th:text="${tag.id}">1</td>
                                    <td>
                                        <span style="font-weight: 500; color: var(--text-main);" th:text="${tag.name}">标签名称</span>
                                    </td>
                                    <td style="color: var(--text-muted);" th:text="${tag.articleCount}">0</td>
                                    <td>
                                        <button th:onclick="'showEditTagModal(' + ${tag.id} + ', \'' + ${tag.name} + '\')'" 
                                                class="btn-outline-custom btn-sm-custom" style="margin-right: 4px;">
                                            <i class="ph-bold ph-pencil"></i> 编辑
                                        </button>
                                        <button th:onclick="'deleteTag(' + ${tag.id} + ')'" 
                                                class="btn-outline-custom btn-sm-custom" style="border-color: #DC3545; color: #DC3545;">
                                            <i class="ph-bold ph-trash"></i> 删除
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div th:if="${tags == null or tags.size() == 0}" class="text-center py-4" style="text-align: center; padding: 40px;">
                            <i class="ph ph-inbox" style="font-size:48px;color:#ccc;"></i>
                            <p style="margin-top: 16px; color: var(--text-muted);">暂无标签</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 分类模态框 -->
    <div id="categoryModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: var(--radius-lg); padding: 24px; max-width: 400px; width: 90%;">
            <h5 style="margin-bottom: 16px; color: var(--text-main); font-size: 16px; font-weight: 600;" id="categoryModalTitle">新增分类</h5>
            <input type="hidden" id="categoryId">
            <input type="text" id="categoryName" placeholder="分类名称" 
                   style="width: 100%; padding: 10px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); outline: none; font-size: 14px; margin-bottom: 16px;">
            <div style="display: flex; gap: 8px; justify-content: flex-end;">
                <button onclick="closeCategoryModal()" class="btn-outline-custom btn-sm-custom">取消</button>
                <button onclick="saveCategory()" class="btn-primary-custom">保存</button>
            </div>
        </div>
    </div>

    <!-- 标签模态框 -->
    <div id="tagModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: var(--radius-lg); padding: 24px; max-width: 400px; width: 90%;">
            <h5 style="margin-bottom: 16px; color: var(--text-main); font-size: 16px; font-weight: 600;" id="tagModalTitle">新增标签</h5>
            <input type="hidden" id="tagId">
            <input type="text" id="tagName" placeholder="标签名称" 
                   style="width: 100%; padding: 10px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); outline: none; font-size: 14px; margin-bottom: 16px;">
            <div style="display: flex; gap: 8px; justify-content: flex-end;">
                <button onclick="closeTagModal()" class="btn-outline-custom btn-sm-custom">取消</button>
                <button onclick="saveTag()" class="btn-primary-custom">保存</button>
            </div>
        </div>
    </div>

    <th:block th:replace="~{admin/layout :: adminScripts}"/>
    <script>
        function showCategoryModal() {
            document.getElementById('categoryModalTitle').textContent = '新增分类';
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryName').value = '';
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').style.display = 'none';
        }

        function showEditCategoryModal(id, name) {
            document.getElementById('categoryModalTitle').textContent = '编辑分类';
            document.getElementById('categoryId').value = id;
            document.getElementById('categoryName').value = name;
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function saveCategory() {
            const id = document.getElementById('categoryId').value;
            const name = document.getElementById('categoryName').value;
            
            if (!name.trim()) {
                alert('请输入分类名称');
                return;
            }

            const url = id ? `/admin/categories/${id}` : '/admin/categories';
            const method = id ? 'PUT' : 'POST';
            
            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                },
                body: JSON.stringify({ name: name })
            })
            .then(response => {
                if (response.ok) {
                    closeCategoryModal();
                    location.reload();
                } else {
                    alert('保存失败，请重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('保存失败，请重试');
            });
        }

        function deleteCategory(id) {
            if (confirm('确定要删除这个分类吗？')) {
                fetch(`/admin/categories/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                    }
                })
                .then(response => {
                    if (response.ok) {
                        location.reload();
                    } else {
                        alert('删除失败，请重试');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('删除失败，请重试');
                });
            }
        }

        function showTagModal() {
            document.getElementById('tagModalTitle').textContent = '新增标签';
            document.getElementById('tagId').value = '';
            document.getElementById('tagName').value = '';
            document.getElementById('tagModal').style.display = 'flex';
        }

        function closeTagModal() {
            document.getElementById('tagModal').style.display = 'none';
        }

        function showEditTagModal(id, name) {
            document.getElementById('tagModalTitle').textContent = '编辑标签';
            document.getElementById('tagId').value = id;
            document.getElementById('tagName').value = name;
            document.getElementById('tagModal').style.display = 'flex';
        }

        function saveTag() {
            const id = document.getElementById('tagId').value;
            const name = document.getElementById('tagName').value;
            
            if (!name.trim()) {
                alert('请输入标签名称');
                return;
            }

            const url = id ? `/admin/tags/${id}` : '/admin/tags';
            const method = id ? 'PUT' : 'POST';
            
            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                },
                body: JSON.stringify({ name: name })
            })
            .then(response => {
                if (response.ok) {
                    closeTagModal();
                    location.reload();
                } else {
                    alert('保存失败，请重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('保存失败，请重试');
            });
        }

        function deleteTag(id) {
            if (confirm('确定要删除这个标签吗？')) {
                fetch(`/admin/tags/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                    }
                })
                .then(response => {
                    if (response.ok) {
                        location.reload();
                    } else {
                        alert('删除失败，请重试');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('删除失败，请重试');
                });
            }
        }

        // 点击模态框外部关闭
        document.getElementById('categoryModal').addEventListener('click', function(e) {
            if (e.target === this) closeCategoryModal();
        });
        document.getElementById('tagModal').addEventListener('click', function(e) {
            if (e.target === this) closeTagModal();
        });
    </script>
</body>
</html>
