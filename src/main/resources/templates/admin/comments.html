<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理 - 知筑后台</title>
    <th:block th:replace="~{admin/layout :: adminStyles}"/>
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{admin/layout :: sidebar('comments')}"></div>

    <!-- 主内容区 -->
    <main class="main-wrapper">
        <!-- 顶栏 -->
        <div th:replace="~{admin/layout :: topbar}"></div>

        <!-- 页面内容 -->
        <div class="content">
            <div class="page-header">
                <h1>评论管理。</h1>
                <p>审核和管理用户评论，维护良好的互动环境。</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title-text">评论列表</div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-outline-custom btn-sm-custom" onclick="filterByStatus('ALL')">全部</button>
                        <button class="btn-outline-custom btn-sm-custom" onclick="filterByStatus('PENDING')">待审核</button>
                        <button class="btn-outline-custom btn-sm-custom" onclick="filterByStatus('APPROVED')">已通过</button>
                        <button class="btn-outline-custom btn-sm-custom" onclick="filterByStatus('REJECTED')">已拒绝</button>
                    </div>
                </div>
                <div class="card-body">
                    <table class="table-custom" th:if="${comments != null and comments.size() > 0}">
                        <thead>
                            <tr>
                                <th width="50">ID</th>
                                <th>昵称</th>
                                <th>内容</th>
                                <th width="100">文章</th>
                                <th width="80">状态</th>
                                <th width="120">时间</th>
                                <th width="180">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="comment : ${comments}">
                                <td style="color: var(--text-muted);" th:text="${comment.id}">1</td>
                                <td style="font-weight: 500; color: var(--text-main);" th:text="${comment.nickname}">用户</td>
                                <td style="color: var(--text-regular);" th:text="${comment.content}">评论内容</td>
                                <td>
                                    <a th:href="@{/articles/{id}(id=${comment.articleId})}" 
                                       style="color: var(--primary); text-decoration: none; font-size: 13px;"
                                       th:text="${comment.articleTitle}">文章标题</a>
                                </td>
                                <td>
                                    <span th:if="${comment.status == 'APPROVED'}" class="badge badge-success">已批准</span>
                                    <span th:if="${comment.status == 'PENDING'}" class="badge badge-warning">待审核</span>
                                    <span th:if="${comment.status == 'REJECTED'}" class="badge badge-danger">已拒绝</span>
                                </td>
                                <td style="color: var(--text-muted); font-size: 13px;" 
                                    th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd')}">2024-01-01</td>
                                <td>
                                    <button th:if="${comment.status != 'APPROVED'}" 
                                            th:onclick="'approveComment(' + ${comment.id} + ')'" 
                                            class="btn-outline-custom btn-sm-custom" 
                                            style="margin-right: 4px; border-color: #28A745; color: #28A745;">
                                        <i class="ph-bold ph-check"></i> 通过
                                    </button>
                                    <button th:if="${comment.status != 'REJECTED'}" 
                                            th:onclick="'rejectComment(' + ${comment.id} + ')'" 
                                            class="btn-outline-custom btn-sm-custom"
                                            style="margin-right: 4px; border-color: #DC3545; color: #DC3545;">
                                        <i class="ph-bold ph-x"></i> 拒绝
                                    </button>
                                    <button th:onclick="'deleteComment(' + ${comment.id} + ')'" 
                                            class="btn-outline-custom btn-sm-custom"
                                            style="border-color: #DC3545; color: #DC3545;">
                                        <i class="ph-bold ph-trash"></i> 删除
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${comments == null or comments.size() == 0}" class="text-center py-4" style="text-align: center; padding: 40px;">
                        <i class="ph ph-inbox" style="font-size:48px;color:#ccc;"></i>
                        <p style="margin-top: 16px; color: var(--text-muted);">暂无评论</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{admin/layout :: adminScripts}"/>
    <script>
        function filterByStatus(status) {
            window.location.href = `/admin/comments?status=${status}`;
        }

        function approveComment(id) {
            if (confirm('确定要通过这条评论吗？')) {
                fetch(`/admin/comments/${id}/approve`, {
                    method: 'POST',
                    headers: {
                        'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                    }
                })
                .then(response => {
                    if (response.ok) {
                        location.reload();
                    } else {
                        alert('操作失败，请重试');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('操作失败，请重试');
                });
            }
        }

        function rejectComment(id) {
            if (confirm('确定要拒绝这条评论吗？')) {
                fetch(`/admin/comments/${id}/reject`, {
                    method: 'POST',
                    headers: {
                        'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                    }
                })
                .then(response => {
                    if (response.ok) {
                        location.reload();
                    } else {
                        alert('操作失败，请重试');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('操作失败，请重试');
                });
            }
        }

        function deleteComment(id) {
            if (confirm('确定要删除这条评论吗？')) {
                fetch(`/admin/comments/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                    }
                })
                .then(response => {
                    if (response.ok) {
                        location.reload();
                    } else {
                        alert('操作失败，请重试');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('操作失败，请重试');
                });
            }
        }
    </script>
</body>
</html>
