<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理 - 知筑后台</title>
    <style th:replace="~{admin/layout :: adminStyles}"></style>
    <style>
        .btn-outline-custom {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-regular);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-outline-custom:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        .btn-sm-custom {
            padding: 6px 12px;
            font-size: 13px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #F3F4F6; color: #6B7280; }
        .badge-warning { background: var(--primary-light); color: var(--primary); }
        .action-btn {
            background: transparent;
            border: none;
            padding: 6px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        .action-btn:hover { background: var(--primary-light); color: var(--primary); }
        .action-btn.delete:hover { background: #FEF2F2; color: #DC2626; }
        .action-btn.approve:hover { background: #ECFDF5; color: #059669; }
        .comment-content {
            max-width: 600px;
            color: var(--text-regular);
            line-height: 1.6;
        }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: white; border-radius: var(--radius-lg);
            padding: 24px; max-width: 500px; width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .reply-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            outline: none;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        .reply-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
    </style>
</head>
<body>

<aside th:replace="~{admin/layout :: sidebar(activePage='comments')}"></aside>

<main class="main-wrapper">
    <header class="topbar">
        <div class="topbar-date">
            <i class="ph-light ph-calendar-blank"></i>
            <span id="currentDate">2026 年 4 月 17 日 · 星期五</span>
        </div>
        
        <div class="topbar-right">
            <button class="topbar-btn" title="查看站点" onclick="window.open('/')"><i class="ph ph-arrow-up-right"></i></button>
            <button class="topbar-btn" title="通知"><i class="ph ph-bell"></i><span class="notif-dot"></span></button>
            
            <div class="theme-menu-wrapper">
                <button class="topbar-btn" id="themeSwitchBtn" title="后台配色">
                    <i class="ph ph-dots-three"></i>
                </button>
                <div class="theme-dropdown" id="themeDropdown">
                    <div class="theme-dropdown-header">后台专属配色</div>
                    <div class="theme-options">
                        <button class="theme-option active" data-color="emerald" data-hex="#059669" data-rgb="5, 150, 105">
                            <span class="color-dot" style="background: #059669;"></span> 翡翠绿
                        </button>
                        <button class="theme-option" data-color="orange" data-hex="#EA580C" data-rgb="234, 88, 12">
                            <span class="color-dot" style="background: #EA580C;"></span> 破风橙
                        </button>
                        <button class="theme-option" data-color="blue" data-hex="#2563EB" data-rgb="37, 99, 235">
                            <span class="color-dot" style="background: #2563EB;"></span> 探索蓝
                        </button>
                        <button class="theme-option" data-color="beige" data-hex="#C89F70" data-rgb="200, 159, 112">
                            <span class="color-dot" style="background: #C89F70;"></span> 岁月黄
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="content">
        <div class="page-header animate-fade-up">
            <h1>评论管理。</h1>
            <p>审核和管理用户评论，维护良好的互动环境。</p>
        </div>

        <div class="card animate-fade-up delay-1">
            <div class="card-header">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div class="card-title-text">评论列表</div>
                    <div style="display: flex; gap: 12px; font-size: 13px; color: var(--text-muted);">
                        <span><i class="ph-bold ph-clock" style="color: var(--primary);"></i> 待审核 <strong id="pendingCount" style="color: var(--primary);">0</strong></span>
                        <span><i class="ph-bold ph-chat-centered-text"></i> 总计 <strong id="totalCount">0</strong></span>
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="btnAll" class="btn-outline-custom btn-sm-custom" onclick="filterByStatus('ALL')">
                        <i class="ph-bold ph-list"></i> 全部
                    </button>
                    <button id="btnPending" class="btn-primary-custom" onclick="filterByStatus('PENDING')">
                        <i class="ph-bold ph-clock"></i> 待审核
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div id="loadingSpinner" style="text-align: center; padding: 40px;">
                    <i class="ph-bold ph-spinner" style="font-size: 40px; color: var(--primary); animation: spin 1s linear infinite;"></i>
                    <p style="margin-top: 16px; color: var(--text-muted);">加载中...</p>
                </div>

                <div id="commentList" style="display: flex; flex-direction: column; gap: 16px;"></div>

                <div id="emptyMessage" style="display:none; text-align: center; padding: 40px;">
                    <i class="ph ph-inbox" style="font-size:48px;color:#ccc;"></i>
                    <p style="margin-top: 16px; color: var(--text-muted);">暂无评论数据</p>
                </div>

                <!-- 分页 -->
                <div id="pagination" style="display:none; justify-content: center; align-items: center; gap: 12px; padding: 20px 0;"></div>
            </div>
        </div>
    </div>
</main>

<div class="modal-overlay" id="replyModal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light);">
            <h5 style="color: var(--text-main); font-size: 16px; font-weight: 600;">回复评论</h5>
            <button type="button" onclick="closeReplyModal()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted);">&times;</button>
        </div>
        <div style="margin-bottom: 20px;">
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 8px;">原评论：</p>
            <div style="background: var(--bg-body); padding: 12px; border-radius: var(--radius-md); margin-bottom: 16px; color: var(--text-regular);">
                <p id="replyOriginalComment" style="margin: 0;"></p>
            </div>
            <textarea class="reply-input" id="replyContent" placeholder="输入回复内容..."></textarea>
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
            <button type="button" class="btn-outline-custom btn-sm-custom" onclick="closeReplyModal()">取消</button>
            <button type="button" class="btn-primary-custom" onclick="submitReply()">
                <i class="ph-bold ph-paper-plane-right"></i> 发送回复
            </button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light);">
            <h5 style="color: var(--text-main); font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px;">
                <i class="ph-bold ph-warning" style="color: var(--primary);"></i> 删除确认
            </h5>
            <button type="button" onclick="closeDeleteModal()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted);">&times;</button>
        </div>
        <div style="margin-bottom: 20px;">
            <p style="color: var(--text-regular);">确定要删除这条评论吗？</p>
            <p style="color: var(--text-muted); font-size: 13px; margin: 8px 0 0 0;">删除后无法恢复</p>
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
            <button type="button" class="btn-outline-custom btn-sm-custom" onclick="closeDeleteModal()">取消</button>
            <button type="button" class="btn-primary-custom" onclick="confirmDelete()" style="background: #DC2626;">
                <i class="ph-bold ph-trash"></i> 确认删除
            </button>
        </div>
    </div>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
<script>
let currentFilter = 'PENDING';
let currentPage = 0;
let totalPages = 0;
let commentToReply = null;
let commentToDelete = null;

document.addEventListener('DOMContentLoaded', function() {
    const dateStr = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    document.getElementById('currentDate').innerText = dateStr.replace(/星期/, '· 星期');
    loadComments();
    loadStats();
    initThemeSwitcher();
});

function initThemeSwitcher() {
    const userMenuBtn = document.getElementById('userMenuBtn');
    const userDropdown = document.getElementById('userDropdown');
    const userMenuIcon = document.getElementById('userMenuIcon');
    const themeSwitchBtn = document.getElementById('themeSwitchBtn');
    const themeDropdown = document.getElementById('themeDropdown');
    const sidebarAvatar = document.getElementById('sidebarAvatar');

    userMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        themeDropdown.classList.remove('show');
        userDropdown.classList.toggle('show');
        userMenuIcon.classList.toggle('menu-open-icon');
    });

    themeSwitchBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        userDropdown.classList.remove('show');
        userMenuIcon.classList.remove('menu-open-icon');
        themeDropdown.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
        if (!userMenuBtn.contains(e.target) && !userDropdown.contains(e.target)) {
            userDropdown.classList.remove('show');
            userMenuIcon.classList.remove('menu-open-icon');
        }
        if (!themeSwitchBtn.contains(e.target) && !themeDropdown.contains(e.target)) {
            themeDropdown.classList.remove('show');
        }
    });

    document.querySelectorAll('.theme-option').forEach(option => {
        option.addEventListener('click', function(e) {
            e.stopPropagation();
            const targetTheme = this.getAttribute('data-color');
            const targetHex = this.getAttribute('data-hex');
            document.documentElement.setAttribute('data-theme', targetTheme);
            document.querySelectorAll('.theme-option').forEach(btn => btn.classList.remove('active'));
            this.classList.add('active');
            sidebarAvatar.src = `https://ui-avatars.com/api/?name=Li&background=${targetHex.substring(1)}&color=fff&font-size=0.4`;
            themeDropdown.classList.remove('show');
        });
    });
}

function loadStats() {
    // 获取待审核评论数量
    fetch('/api/admin/comments/count/pending')
        .then(response => response.json())
        .then(result => {
            if (result.success && result.data) {
                document.getElementById('pendingCount').textContent = result.data || 0;
            }
        })
        .catch(error => console.error('Error loading stats:', error));

    // 获取所有评论统计
    fetch('/api/admin/comments?page=0&size=1')
        .then(response => response.json())
        .then(result => {
            if (result.success && result.data) {
                document.getElementById('totalCount').textContent = result.data.totalElements || 0;
            }
        })
        .catch(error => console.error('Error loading total count:', error));
}

function filterByStatus(status) {
    currentFilter = status;
    currentPage = 0;  // 重置页码

    // 更新按钮样式
    const btnAll = document.getElementById('btnAll');
    const btnPending = document.getElementById('btnPending');

    if (status === 'ALL') {
        btnAll.className = 'btn-primary-custom btn-sm-custom';
        btnPending.className = 'btn-outline-custom btn-sm-custom';
    } else {
        btnAll.className = 'btn-outline-custom btn-sm-custom';
        btnPending.className = 'btn-primary-custom btn-sm-custom';
    }

    loadComments();
}

function renderPagination() {
    const pagination = document.getElementById('pagination');
    if (!pagination) return;

    // 即使只有1页也显示分页信息，但隐藏分页按钮
    if (totalPages <= 1) {
        pagination.innerHTML = `<span style="color: var(--text-muted); font-size: 14px;">共 ${totalPages} 页</span>`;
        pagination.style.display = 'flex';
        return;
    }

    pagination.innerHTML = `
        ${currentPage > 0 ? `<button class="btn-outline-custom btn-sm-custom" onclick="goToPage(${currentPage - 1})">上一页</button>` : ''}
        <span style="color: var(--text-muted); font-size: 14px; padding: 0 8px;">共 ${totalPages} 页</span>
        <input type="number" min="1" max="${totalPages}" value="${currentPage + 1}" id="pageJumpInput" style="width: 50px; padding: 4px 8px; border: 1px solid var(--border-light); border-radius: var(--radius-sm); font-size: 14px; text-align: center;" onkeypress="if(event.keyCode===13) jumpToPage()">
        <button class="btn-outline-custom btn-sm-custom" onclick="jumpToPage()">跳转</button>
        ${currentPage < totalPages - 1 ? `<button class="btn-outline-custom btn-sm-custom" onclick="goToPage(${currentPage + 1})">下一页</button>` : ''}
    `;
    pagination.style.display = 'flex';
}

function jumpToPage() {
    const input = document.getElementById('pageJumpInput');
    const page = parseInt(input.value) - 1;
    if (page >= 0 && page < totalPages) {
        goToPage(page);
    } else {
        showToast('请输入有效页码（1-' + totalPages + '）', 'error');
    }
}

function goToPage(page) {
    if (page < 0 || page >= totalPages) return;
    currentPage = page;
    loadComments();
}

function loadComments() {
    document.getElementById('loadingSpinner').style.display = 'block';
    document.getElementById('commentList').style.display = 'none';
    document.getElementById('emptyMessage').style.display = 'none';
    document.getElementById('pagination').style.display = 'none';

    // 根据过滤器选择不同的API路径，添加分页参数
    const apiUrl = currentFilter === 'PENDING'
        ? `/api/admin/comments/pending?page=${currentPage}&size=10`
        : `/api/admin/comments?page=${currentPage}&size=10`;

    fetch(apiUrl)
        .then(response => response.json())
        .then(result => {
            document.getElementById('loadingSpinner').style.display = 'none';

            if (result.success && result.data) {
                totalPages = result.data.totalPages || 1;

                if (result.data.content && result.data.content.length > 0) {
                    renderComments(result.data.content);
                    document.getElementById('commentList').style.display = 'flex';
                    renderPagination();
                    document.getElementById('pagination').style.display = 'flex';
                } else {
                    document.getElementById('emptyMessage').style.display = 'block';
                }
            } else {
                document.getElementById('emptyMessage').style.display = 'block';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('emptyMessage').style.display = 'block';
        });
}

function renderComments(comments) {
    const list = document.getElementById('commentList');
    list.innerHTML = comments.map(comment => `
        <div class="card" style="border: 1px solid var(--border-light);">
            <div class="card-body" style="padding: 16px 24px;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(comment.nickname || 'User')}&background=random&color=fff"
                             style="width: 36px; height: 36px; border-radius: 50%;" alt="avatar">
                        <div>
                            <div style="font-weight: 600; color: var(--text-main);">${comment.nickname || '匿名'}</div>
                            <div style="font-size: 12.5px; color: var(--text-muted);">
                                ${comment.email ? comment.email : ''}
                                ${comment.createdAt ? ' · ' + new Date(comment.createdAt).toLocaleString('zh-CN') : ''}
                            </div>
                        </div>
                    </div>
                    <span class="badge ${comment.status === 'APPROVED' ? 'badge-success' : 'badge-warning'}">
                        ${comment.status === 'APPROVED' ? '已通过' : '待审核'}
                    </span>
                </div>
                <div class="comment-content" style="margin-bottom: 12px;">
                    <p style="margin: 0;">${comment.content || ''}</p>
                </div>
                <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">
                    <i class="ph-bold ph-article"></i> 评论于：${comment.articleTitle || '未知文章'}
                </div>
                ${comment.replyContent ? `
                    <div style="background: var(--primary-light); padding: 12px; border-radius: var(--radius-md); margin-top: 12px;">
                        <div style="font-size: 12.5px; color: var(--primary); font-weight: 600; margin-bottom: 4px;">
                            <i class="ph-bold ph-reply"></i> 管理员回复
                        </div>
                        <p style="margin: 0; color: var(--text-regular);">${comment.replyContent}</p>
                    </div>
                ` : ''}
                <div style="display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-light);">
                    ${comment.status === 'PENDING' ? `
                        <button class="action-btn approve" title="通过" onclick="approveComment(${comment.id})">
                            <i class="ph-bold ph-check"></i> 通过
                        </button>
                    ` : ''}
                    <button class="action-btn" title="回复" onclick="showReplyModal(${comment.id}, '${(comment.content || '').replace(/'/g, "\\'")}')">
                        <i class="ph-bold ph-chat-centered-text"></i> 回复
                    </button>
                    <button class="action-btn delete" title="删除" onclick="showDeleteModal(${comment.id})">
                        <i class="ph-bold ph-trash"></i> 删除
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

function approveComment(id) {
    fetch(`/api/admin/comments/${id}/approve`, { method: 'PUT' })
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                showToast('评论已批准', 'success');
                loadComments();
                loadStats();
            } else {
                showToast('操作失败', 'error');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            showToast('操作失败', 'error');
        });
}
function showReplyModal(id, content) {
    commentToReply = id;
    document.getElementById('replyOriginalComment').textContent = content;
    document.getElementById('replyContent').value = '';
    document.getElementById('replyModal').classList.add('show');
}

function closeReplyModal() {
    document.getElementById('replyModal').classList.remove('show');
    commentToReply = null;
}

function submitReply() {
    const content = document.getElementById('replyContent').value.trim();
    if (!content) {
        showToast('请输入回复内容', 'error');
        return;
    }

    fetch(`/api/admin/comments/${commentToReply}/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            closeReplyModal();
            showToast('回复成功', 'success');
            loadComments();
        } else {
            showToast('回复失败，请重试', 'error');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showToast('回复失败，请重试', 'error');
    });
}

function showDeleteModal(id) {
    commentToDelete = id;
    document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('show');
    commentToDelete = null;
}

function confirmDelete() {
    if (commentToDelete) {
        fetch(`/api/admin/comments/${commentToDelete}`, { method: 'DELETE' })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    closeDeleteModal();
                    showToast('评论已删除', 'success');
                    loadComments();
                    loadStats();
                } else {
                    showToast('删除失败，请重试', 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showToast('删除失败，请重试', 'error');
            });
    }
}

function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
        <i class="ph-bold ${type === 'success' ? 'ph-check-circle' : 'ph-warning'}" style="font-size: 20px;"></i>
        <span style="color: var(--text-regular);">${message}</span>
    `;
    document.body.appendChild(toast);

    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
</script>
</body>
</html>
