<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>演示编辑 - puber-blog后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- CodeMirror编辑器 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/darcula.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .CodeMirror { height: 500px; border: 1px solid #dee2e6; }
        .preview-frame { width: 100%; height: 500px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <div th:replace="~{admin/fragments :: navbar('demos')}"></div>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0" id="pageTitle"><i class="bi bi-code-square"></i> 新增演示</h5>
            </div>
            <div class="card-body">
                <form id="demoForm">
                    <input type="hidden" id="demoId">

                    <!-- 基本信息 -->
                    <div class="mb-3">
                        <label for="name" class="form-label">演示名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="slug" class="form-label">别名</label>
                        <input type="text" class="form-control" id="slug">
                        <div class="form-text">如果不填写，系统自动生成</div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">描述</label>
                        <textarea class="form-control" id="description" rows="2"></textarea>
                    </div>

                    <!-- 完整HTML内容编辑器 -->
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label class="form-label mb-0">完整HTML内容 <span class="text-danger">*</span></label>
                        </div>
                        <textarea id="fullHtmlEditor"></textarea>
                        <div class="form-text">请粘贴完整的HTML文件内容（包含HTML结构、CSS样式和JavaScript脚本）</div>
                    </div>

                    <!-- 实时预览 -->
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label class="form-label mb-0">实时预览</label>
                            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="updatePreview()">
                                <i class="bi bi-refresh"></i> 刷新预览
                            </button>
                        </div>
                        <iframe id="previewFrame" class="preview-frame"></iframe>
                    </div>

                    <!-- 状态选择 -->
                    <div class="mb-3">
                        <label for="status" class="form-label">状态</label>
                        <select class="form-select" id="status">
                            <option value="DRAFT">草稿</option>
                            <option value="PUBLISHED">发布</option>
                        </select>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="d-flex justify-content-between">
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='/admin/demos'">
                            <i class="bi bi-x-circle"></i> 取消
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> 保存
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- CodeMirror -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

    <!-- 外部JavaScript文件 -->
    <script src="/js/demo-editor.js"></script>
</body>
</html>
