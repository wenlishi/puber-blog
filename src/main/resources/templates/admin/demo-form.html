<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演示编辑 - 知筑后台</title>
    <th:block th:replace="~{admin/layout :: adminStyles}"/>
    <!-- CodeMirror 编辑器 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/darcula.min.css" rel="stylesheet">
    <style>
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block; font-size: 13.5px; font-weight: 600;
            color: var(--text-main); margin-bottom: 8px;
        }
        .form-control, .form-select {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm); outline: none; font-size: 14px;
            background: var(--bg-surface); color: var(--text-regular);
            transition: border-color 0.2s;
        }
        .form-control:focus, .form-select:focus { border-color: var(--primary); }
        .form-help { font-size: 12.5px; color: var(--text-muted); margin-top: 6px; }
        .CodeMirror {
            height: 500px; border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm); font-size: 14px;
        }
        .preview-frame { width: 100%; height: 500px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); }
        .btn-group-custom { display: flex; gap: 8px; margin-top: 24px; }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{admin/layout :: sidebar('demos')}"></div>

    <!-- 主内容区 -->
    <main class="main-wrapper">
        <!-- 顶栏 -->
        <div th:replace="~{admin/layout :: topbar}"></div>

        <!-- 页面内容 -->
        <div class="content">
            <div class="page-header">
                <h1>演示编辑。</h1>
                <p>创建和编辑技术演示项目，支持实时预览。</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form id="demoForm">
                        <input type="hidden" id="demoId">

                        <!-- 基本信息 -->
                        <div class="form-group">
                            <label for="name" class="form-label">演示名称 <span style="color: var(--primary);">*</span></label>
                            <input type="text" class="form-control" id="name" required placeholder="请输入演示名称">
                        </div>

                        <div class="form-group">
                            <label for="slug" class="form-label">别名</label>
                            <input type="text" class="form-control" id="slug" placeholder="可选，用于 URL">
                            <div class="form-help">如果不填写，系统自动生成</div>
                        </div>

                        <div class="form-group">
                            <label for="description" class="form-label">描述</label>
                            <textarea class="form-control" id="description" rows="2" placeholder="简要描述这个演示"></textarea>
                        </div>

                        <!-- 完整 HTML 内容编辑器 -->
                        <div class="form-group">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                <label class="form-label" style="margin: 0;">完整 HTML 内容 <span style="color: var(--primary);">*</span></label>
                            </div>
                            <textarea id="fullHtmlEditor"></textarea>
                            <div class="form-help">请粘贴完整的 HTML 文件内容（包含 HTML 结构、CSS 样式和 JavaScript 脚本）</div>
                        </div>

                        <!-- 实时预览 -->
                        <div class="form-group">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                <label class="form-label" style="margin: 0;">实时预览</label>
                                <button type="button" class="btn-outline-custom btn-sm-custom" onclick="updatePreview()">
                                    <i class="ph-bold ph-arrow-counter-clockwise"></i> 刷新预览
                                </button>
                            </div>
                            <iframe id="previewFrame" class="preview-frame"></iframe>
                        </div>

                        <!-- 状态选择 -->
                        <div class="form-group">
                            <label for="status" class="form-label">状态</label>
                            <select class="form-select" id="status">
                                <option value="DRAFT">草稿</option>
                                <option value="PUBLISHED">发布</option>
                            </select>
                        </div>

                        <!-- 操作按钮 -->
                        <div class="btn-group-custom">
                            <button type="submit" class="btn-primary-custom" style="flex: 1; justify-content: center;">
                                <i class="ph-bold ph-check"></i> 保存
                            </button>
                            <button type="button" class="btn-outline-custom btn-sm-custom" onclick="window.location.href='/admin/demos'">
                                <i class="ph-bold ph-x"></i> 取消
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{admin/layout :: adminScripts}"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script>
        let editor;

        document.addEventListener('DOMContentLoaded', function() {
            editor = CodeMirror.fromTextArea(document.getElementById('fullHtmlEditor'), {
                mode: 'htmlmixed',
                theme: 'darcula',
                lineNumbers: true,
                lineWrapping: true,
                autoCloseTags: true,
                autoCloseBrackets: true,
                matchTags: { bothTags: true },
                foldGutter: true,
                gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter']
            });

            editor.on('change', function() {
                updatePreview();
            });

            loadDemoIfNeeded();
        });

        function loadDemoIfNeeded() {
            const urlParams = new URLSearchParams(window.location.search);
            const demoId = urlParams.get('id');
            if (demoId) {
                fetch(`/api/admin/demos/${demoId}`)
                    .then(response => response.json())
                    .then(result => {
                        if (result.code === 200) {
                            const demo = result.data;
                            document.getElementById('demoId').value = demo.id;
                            document.getElementById('name').value = demo.name;
                            document.getElementById('slug').value = demo.slug || '';
                            document.getElementById('description').value = demo.description || '';
                            editor.setValue(demo.fullHtml || '');
                            document.getElementById('status').value = demo.status;
                            document.getElementById('pageTitle').textContent = '编辑演示';
                            updatePreview();
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
            }
        }

        function updatePreview() {
            const content = editor.getValue();
            const frame = document.getElementById('previewFrame');
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open();
            doc.write(content);
            doc.close();
        }

        document.getElementById('demoForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const demoId = document.getElementById('demoId').value;
            const demoData = {
                name: document.getElementById('name').value,
                slug: document.getElementById('slug').value,
                description: document.getElementById('description').value,
                fullHtml: editor.getValue(),
                status: document.getElementById('status').value
            };

            const url = demoId ? `/api/admin/demos/${demoId}` : '/api/admin/demos';
            const method = demoId ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                },
                body: JSON.stringify(demoData)
            })
            .then(response => response.json())
            .then(result => {
                if (result.code === 200) {
                    alert('保存成功！');
                    if (!demoId) {
                        window.location.href = '/admin/demos';
                    }
                } else {
                    alert('保存失败：' + (result.message || '请重试'));
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('保存失败，请重试');
            });
        });
    </script>
</body>
</html>
