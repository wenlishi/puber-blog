<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演示管理 - 知筑后台</title>
    <th:block th:replace="~{admin/layout :: adminStyles}"/>
    <style>
        .btn-group-custom { display: flex; gap: 8px; }
        .btn-group-custom .btn-outline-custom { border-radius: var(--radius-sm); }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{admin/layout :: sidebar('demos')}"></div>

    <!-- 主内容区 -->
    <main class="main-wrapper">
        <!-- 顶栏 -->
        <div th:replace="~{admin/layout :: topbar}"></div>

        <!-- 页面内容 -->
        <div class="content">
            <div class="page-header">
                <h1>演示管理。</h1>
                <p>管理和展示技术演示项目，分享代码成果。</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title-text">演示列表</div>
                    <a href="/admin/demos/new" class="btn-primary-custom">
                        <i class="ph-bold ph-plus"></i> 新增演示
                    </a>
                </div>
                <div class="card-body">
                    <!-- 状态筛选 -->
                    <div class="btn-group-custom" style="margin-bottom: 20px;">
                        <button type="button" class="btn-primary-custom" onclick="loadDemos('ALL')">全部</button>
                        <button type="button" class="btn-outline-custom btn-sm-custom" onclick="loadDemos('PUBLISHED')">已发布</button>
                        <button type="button" class="btn-outline-custom btn-sm-custom" onclick="loadDemos('DRAFT')">草稿</button>
                    </div>

                    <!-- 演示列表表格 -->
                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th width="50">ID</th>
                                    <th>演示名称</th>
                                    <th width="150">别名</th>
                                    <th width="80">状态</th>
                                    <th width="80">浏览量</th>
                                    <th width="120">发布时间</th>
                                    <th width="180">操作</th>
                                </tr>
                            </thead>
                            <tbody id="demoList">
                                <tr>
                                    <td colspan="7" class="text-center" style="text-align: center; padding: 40px; color: var(--text-muted);">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 分页 -->
                    <nav id="pagination" style="margin-top: 20px;"></nav>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{admin/layout :: adminScripts}"/>
    <script>
        let currentPage = 0;
        let currentStatus = 'ALL';

        function loadDemos(status = currentStatus, page = currentPage) {
            currentStatus = status;
            currentPage = page;

            document.querySelectorAll('.btn-group-custom .btn-primary-custom, .btn-group-custom .btn-outline-custom').forEach(btn => {
                btn.classList.remove('btn-primary-custom');
                btn.classList.add('btn-outline-custom', 'btn-sm-custom');
            });
            event.target.classList.remove('btn-outline-custom', 'btn-sm-custom');
            event.target.classList.add('btn-primary-custom');

            fetch(`/api/admin/demos?status=${status}&page=${page}&size=10`)
                .then(response => response.json())
                .then(result => {
                    if (result.code === 200) {
                        renderDemoList(result.data.content);
                        renderPagination(result.data.totalPages);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('demoList').innerHTML = '<tr><td colspan="7" class="text-center" style="text-align: center; padding: 40px; color: var(--text-muted);">加载失败</td></tr>';
                });
        }

        function renderDemoList(demos) {
            const tbody = document.getElementById('demoList');
            if (demos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center" style="text-align: center; padding: 40px; color: var(--text-muted);">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = demos.map(demo => `
                <tr>
                    <td style="color: var(--text-muted);">${demo.id}</td>
                    <td>
                        <a href="/demo/${demo.slug}" target="_blank" 
                           style="color: var(--primary); text-decoration: none; font-weight: 500;"
                           th:text="${demo.name}">${demo.name}</a>
                    </td>
                    <td style="color: var(--text-muted); font-size: 13.5px;">${demo.slug}</td>
                    <td>
                        ${demo.status === 'PUBLISHED' 
                            ? '<span class="badge badge-success"><i class="ph-bold ph-check"></i> 已发布</span>'
                            : '<span class="badge badge-secondary"><i class="ph-bold ph-file"></i> 草稿</span>'
                        }
                    </td>
                    <td style="color: var(--text-muted);">${demo.viewCount || 0}</td>
                    <td style="color: var(--text-muted); font-size: 13.5px;">${demo.publishedAt ? new Date(demo.publishedAt).toLocaleDateString('zh-CN') : '-'}</td>
                    <td>
                        <a href="/admin/demos/${demo.id}/edit" class="btn-outline-custom btn-sm-custom" style="margin-right: 4px;">
                            <i class="ph-bold ph-pencil"></i> 编辑
                        </a>
                        <button onclick="deleteDemo(${demo.id})" class="btn-outline-custom btn-sm-custom" style="border-color: #DC3545; color: #DC3545;">
                            <i class="ph-bold ph-trash"></i> 删除
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function renderPagination(totalPages) {
            const nav = document.getElementById('pagination');
            if (totalPages <= 1) {
                nav.innerHTML = '';
                return;
            }

            let html = '<ul style="display: flex; list-style: none; gap: 8px; justify-content: center; padding: 0; margin: 0;">';
            for (let i = 0; i < totalPages; i++) {
                html += `<li><button class="btn-sm-custom ${i === currentPage ? 'btn-primary-custom' : 'btn-outline-custom'}" onclick="loadDemos('${currentStatus}', ${i})">${i + 1}</button></li>`;
            }
            html += '</ul>';
            nav.innerHTML = html;
        }

        function deleteDemo(id) {
            if (confirm('确定要删除这个演示吗？')) {
                fetch(`/api/admin/demos/${id}`, { method: 'DELETE' })
                    .then(response => response.json())
                    .then(result => {
                        if (result.code === 200) {
                            alert('删除成功！');
                            loadDemos(currentStatus, currentPage);
                        } else {
                            alert('删除失败，请重试');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('删除失败，请重试');
                    });
            }
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadDemos();
        });
    </script>
</body>
</html>
