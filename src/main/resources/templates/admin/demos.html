<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>演示管理 - puber-blog后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div th:replace="~{admin/fragments :: navbar('demos')}"></div>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-code-square"></i> 演示管理</h5>
            </div>
            <div class="card-body">
                <!-- 操作按钮 -->
                <div class="mb-3">
                    <a href="/admin/demos/new" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> 新增演示
                    </a>
                </div>

                <!-- 状态筛选 -->
                <div class="mb-3">
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-outline-primary active" onclick="loadDemos('ALL')">全部</button>
                        <button type="button" class="btn btn-outline-success" onclick="loadDemos('PUBLISHED')">已发布</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="loadDemos('DRAFT')">草稿</button>
                    </div>
                </div>

                <!-- 演示列表表格 -->
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>演示名称</th>
                                <th>别名</th>
                                <th>状态</th>
                                <th>浏览量</th>
                                <th>发布时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="demoList">
                            <tr>
                                <td colspan="7" class="text-center">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 分页 -->
                <nav id="pagination"></nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPage = 0;
        let currentStatus = 'ALL';

        // 加载演示列表
        function loadDemos(status = currentStatus, page = currentPage) {
            currentStatus = status;
            currentPage = page;

            // 更新按钮状态
            document.querySelectorAll('.btn-group .btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            fetch(`/api/admin/demos?status=${status}&page=${page}&size=10`)
                .then(response => response.json())
                .then(result => {
                    if (result.code === 200) {
                        renderDemoList(result.data.content);
                        renderPagination(result.data.totalPages);
                    }
                });
        }

        // 渲染演示列表
        function renderDemoList(demos) {
            const tbody = document.getElementById('demoList');
            if (demos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = demos.map(demo => `
                <tr>
                    <td>${demo.id}</td>
                    <td><a href="/demo/${demo.slug}" target="_blank">${demo.name}</a></td>
                    <td>${demo.slug}</td>
                    <td>
                        <span class="badge ${demo.status === 'PUBLISHED' ? 'bg-success' : 'bg-secondary'}">
                            ${demo.status === 'PUBLISHED' ? '已发布' : '草稿'}
                        </span>
                    </td>
                    <td>${demo.viewCount}</td>
                    <td>${demo.publishedAt ? formatDate(demo.publishedAt) : '-'}</td>
                    <td>
                        <a href="/admin/demos/${demo.id}/edit" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <button onclick="deleteDemo(${demo.id})" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 渲染分页
        function renderPagination(totalPages) {
            const nav = document.getElementById('pagination');
            if (totalPages <= 1) {
                nav.innerHTML = '';
                return;
            }

            let html = '<ul class="pagination justify-content-center">';
            for (let i = 0; i < totalPages; i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" onclick="loadDemos('${currentStatus}', ${i})">${i + 1}</a>
                </li>`;
            }
            html += '</ul>';
            nav.innerHTML = html;
        }

        // 删除演示
        function deleteDemo(id) {
            if (confirm('确定要删除这个演示吗？')) {
                fetch(`/api/admin/demos/${id}`, { method: 'DELETE' })
                    .then(response => response.json())
                    .then(result => {
                        if (result.code === 200) {
                            alert('删除成功！');
                            loadDemos(currentStatus, currentPage);
                        }
                    });
            }
        }

        // 格式化日期
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        // 页面加载时获取演示列表
        document.addEventListener('DOMContentLoaded', () => loadDemos('ALL'));
    </script>
</body>
</html>
