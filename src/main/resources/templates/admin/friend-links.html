<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友链管理 - 知筑后台</title>
    <th:block th:replace="~{admin/layout :: adminStyles}"/>
    <style>
        .table-custom img.logo-preview { width: 40px; height: 40px; object-fit: cover; border-radius: var(--radius-sm); }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content-custom {
            background: white; border-radius: var(--radius-lg); padding: 24px;
            max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block; font-size: 13.5px; font-weight: 600;
            color: var(--text-main); margin-bottom: 8px;
        }
        .form-control, .form-select {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm); outline: none; font-size: 14px;
            background: var(--bg-surface); color: var(--text-regular);
            transition: border-color 0.2s;
        }
        .form-control:focus, .form-select:focus { border-color: var(--primary); }
        .form-help { font-size: 12.5px; color: var(--text-muted); margin-top: 6px; }
        .radio-group { display: flex; gap: 16px; }
        .radio-label {
            display: flex; align-items: center; gap: 6px;
            font-size: 14px; color: var(--text-regular); cursor: pointer;
        }
        .radio-label input[type="radio"] { accent-color: var(--primary); }
        .btn-group-custom { display: flex; gap: 8px; margin-top: 24px; }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div th:replace="~{admin/layout :: sidebar('friend-links')}"></div>

    <!-- 主内容区 -->
    <main class="main-wrapper">
        <!-- 顶栏 -->
        <div th:replace="~{admin/layout :: topbar}"></div>

        <!-- 页面内容 -->
        <div class="content">
            <div class="page-header">
                <h1>友情链接。</h1>
                <p>管理合作伙伴链接，促进网站间交流。</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title-text">友链列表</div>
                    <button type="button" class="btn-primary-custom" onclick="showAddModal()">
                        <i class="ph-bold ph-plus"></i> 新增友链
                    </button>
                </div>
                <div class="card-body">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th width="50">ID</th>
                                <th width="80">Logo</th>
                                <th width="150">名称</th>
                                <th>URL</th>
                                <th width="200">描述</th>
                                <th width="80">排序</th>
                                <th width="80">状态</th>
                                <th width="180">操作</th>
                            </tr>
                        </thead>
                        <tbody id="friendLinksTableBody">
                            <tr th:each="link : ${friendLinks}">
                                <td style="color: var(--text-muted);" th:text="${link.id}">1</td>
                                <td>
                                    <img th:if="${link.logo != null and link.logo != ''}"
                                         th:src="${link.logo}"
                                         class="logo-preview"
                                         alt="Logo">
                                    <span th:unless="${link.logo != null and link.logo != ''}"
                                          style="color: var(--text-muted); font-size: 13px;">无 Logo</span>
                                </td>
                                <td>
                                    <span style="font-weight: 500; color: var(--text-main);" th:text="${link.name}">友链名称</span>
                                </td>
                                <td>
                                    <a th:href="${link.url}" target="_blank" 
                                       style="color: var(--primary); text-decoration: none; font-size: 13.5px;"
                                       th:text="${link.url}">URL</a>
                                </td>
                                <td style="color: var(--text-regular); font-size: 13.5px;" th:text="${link.description}">描述</td>
                                <td style="color: var(--text-muted);" th:text="${link.sortOrder}">0</td>
                                <td>
                                    <span th:if="${link.status == 'ACTIVE'}" class="badge badge-success">启用</span>
                                    <span th:if="${link.status == 'INACTIVE'}" class="badge badge-secondary">禁用</span>
                                </td>
                                <td>
                                    <button type="button" class="btn-outline-custom btn-sm-custom"
                                            th:onclick="'editFriendLink(' + ${link.id} + ')'"
                                            style="margin-right: 4px;">
                                        <i class="ph-bold ph-pencil"></i> 编辑
                                    </button>
                                    <button type="button" class="btn-outline-custom btn-sm-custom"
                                            th:if="${link.status == 'INACTIVE'}"
                                            th:onclick="'activateFriendLink(' + ${link.id} + ')'"
                                            style="margin-right: 4px; border-color: #28A745; color: #28A745;">
                                        <i class="ph-bold ph-check"></i> 启用
                                    </button>
                                    <button type="button" class="btn-outline-custom btn-sm-custom"
                                            th:if="${link.status == 'ACTIVE'}"
                                            th:onclick="'deactivateFriendLink(' + ${link.id} + ')'"
                                            style="margin-right: 4px; border-color: #DC3545; color: #DC3545;">
                                        <i class="ph-bold ph-x"></i> 禁用
                                    </button>
                                    <button type="button" class="btn-outline-custom btn-sm-custom"
                                            th:onclick="'deleteFriendLink(' + ${link.id} + ')'"
                                            style="border-color: #DC3545; color: #DC3545;">
                                        <i class="ph-bold ph-trash"></i> 删除
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(friendLinks)}">
                                <td colspan="8" class="text-center text-muted py-4" style="text-align: center; padding: 40px;">
                                    <i class="ph ph-inbox" style="font-size: 48px; color: #ccc;"></i><br>
                                    <span style="color: var(--text-muted); margin-top: 16px; display: block;">暂无友链数据</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- 新增/编辑模态框 -->
    <div id="friendLinkModal" class="modal-overlay">
        <div class="modal-content-custom">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light);">
                <h5 id="modalTitle" style="color: var(--text-main); font-size: 16px; font-weight: 600; margin: 0;">
                    <i class="ph-bold ph-plus" style="color: var(--primary);"></i> 新增友链
                </h5>
                <button type="button" onclick="closeModal()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted);">&times;</button>
            </div>
            <form id="friendLinkForm">
                <input type="hidden" id="friendLinkId">

                <div class="form-group">
                    <label for="name" class="form-label">名称 <span style="color: var(--primary);">*</span></label>
                    <input type="text" class="form-control" id="name" name="name" required placeholder="请输入友链名称">
                </div>

                <div class="form-group">
                    <label for="url" class="form-label">URL <span style="color: var(--primary);">*</span></label>
                    <input type="url" class="form-control" id="url" name="url" required placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">描述</label>
                    <textarea class="form-control" id="description" name="description" rows="2" placeholder="简要描述该网站"></textarea>
                </div>

                <div class="form-group">
                    <label for="logo" class="form-label">Logo URL</label>
                    <input type="url" class="form-control" id="logo" name="logo" placeholder="https://example.com/logo.png">
                    <div class="form-help">建议尺寸：100x100 像素</div>
                </div>

                <div class="form-group">
                    <label for="sortOrder" class="form-label">排序</label>
                    <input type="number" class="form-control" id="sortOrder" name="sortOrder" value="0">
                    <div class="form-help">数字越小越靠前</div>
                </div>

                <div class="form-group">
                    <label class="form-label">状态</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="status" id="statusActive" value="ACTIVE" checked>
                            启用
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="status" id="statusInactive" value="INACTIVE">
                            禁用
                        </label>
                    </div>
                </div>

                <div class="btn-group-custom">
                    <button type="submit" class="btn-primary-custom" style="flex: 1; justify-content: center;">
                        <i class="ph-bold ph-check"></i> 保存
                    </button>
                    <button type="button" class="btn-outline-custom btn-sm-custom" onclick="closeModal()">
                        取消
                    </button>
                </div>
            </form>
        </div>
    </div>

    <th:block th:replace="~{admin/layout :: adminScripts}"/>
    <script>
        function showAddModal() {
            document.getElementById('modalTitle').innerHTML = '<i class="ph-bold ph-plus" style="color: var(--primary);"></i> 新增友链';
            document.getElementById('friendLinkId').value = '';
            document.getElementById('friendLinkForm').reset();
            document.getElementById('friendLinkModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('friendLinkModal').style.display = 'none';
        }

        function editFriendLink(id) {
            fetch(`/admin/friend-links/api/${id}`)
                .then(response => response.json())
                .then(link => {
                    document.getElementById('modalTitle').innerHTML = '<i class="ph-bold ph-pencil" style="color: var(--primary);"></i> 编辑友链';
                    document.getElementById('friendLinkId').value = link.id;
                    document.getElementById('name').value = link.name;
                    document.getElementById('url').value = link.url;
                    document.getElementById('description').value = link.description || '';
                    document.getElementById('logo').value = link.logo || '';
                    document.getElementById('sortOrder').value = link.sortOrder || 0;
                    document.getElementById(link.status === 'ACTIVE' ? 'statusActive' : 'statusInactive').checked = true;
                    document.getElementById('friendLinkModal').style.display = 'flex';
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('获取友链信息失败');
                });
        }

        function activateFriendLink(id) {
            if (confirm('确定要启用这个友链吗？')) {
                updateFriendLinkStatus(id, 'ACTIVE');
            }
        }

        function deactivateFriendLink(id) {
            if (confirm('确定要禁用这个友链吗？')) {
                updateFriendLinkStatus(id, 'INACTIVE');
            }
        }

        function updateFriendLinkStatus(id, status) {
            fetch(`/admin/friend-links/${id}/status`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                },
                body: JSON.stringify({ status: status })
            })
            .then(response => {
                if (response.ok) {
                    location.reload();
                } else {
                    alert('操作失败，请重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('操作失败，请重试');
            });
        }

        function deleteFriendLink(id) {
            if (confirm('确定要删除这个友链吗？')) {
                fetch(`/admin/friend-links/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                    }
                })
                .then(response => {
                    if (response.ok) {
                        location.reload();
                    } else {
                        alert('删除失败，请重试');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('删除失败，请重试');
                });
            }
        }

        document.getElementById('friendLinkForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const id = document.getElementById('friendLinkId').value;
            const formData = {
                name: document.getElementById('name').value,
                url: document.getElementById('url').value,
                description: document.getElementById('description').value,
                logo: document.getElementById('logo').value,
                sortOrder: parseInt(document.getElementById('sortOrder').value),
                status: document.querySelector('input[name="status"]:checked').value
            };

            const url = id ? `/admin/friend-links/${id}` : '/admin/friend-links';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                },
                body: JSON.stringify(formData)
            })
            .then(response => {
                if (response.ok) {
                    closeModal();
                    location.reload();
                } else {
                    alert('保存失败，请重试');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('保存失败，请重试');
            });
        });

        // 点击模态框外部关闭
        document.getElementById('friendLinkModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
