<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台布局模板</title>

    <!-- CSRF Token Meta 标签 -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <!-- 此文件是布局模板，不直接使用 -->
</head>
<body>

<!-- 后台公共样式 Fragment - 简化版本 -->
<th:block th:fragment="adminStyles">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/phosphor-web-loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/admin-styles.css">
    <script src="/js/admin-theme.js"></script>
    <script>
        // 立即应用保存的主题颜色（避免页面渲染时闪烁）
        (function() {
            try {
                var savedTheme = localStorage.getItem('admin_theme_color') || 'emerald';
                document.documentElement.setAttribute('data-theme', savedTheme);
            } catch(e) {}
        })();
    </script>
</th:block>

<!-- 后台侧边栏 Fragment -->
<aside class="sidebar" id="sidebar" th:fragment="sidebar(activePage)">
    <div class="sidebar-header">
        <a href="/admin/dashboard" class="logo">
            <div class="logo-icon"><i class="ph-bold ph-feather"></i></div>
            <div class="logo-text">
                <span class="logo-title">ZHIZHU.</span>
                <span class="logo-sub">工作台</span>
            </div>
        </a>
    </div>

    <div class="nav-body">
        <div class="nav-section-label">创作</div>
        <a href="/admin/dashboard" class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active'">
            <i class="ph ph-squares-four nav-icon"></i> 概览
        </a>
        <a href="/admin/categories" class="nav-item" th:classappend="${activePage == 'categories'} ? 'active'">
            <i class="ph ph-folder-open nav-icon"></i> 专栏与分类
        </a>
        <a href="#" class="nav-item">
            <i class="ph ph-image nav-icon"></i> 我的图床
        </a>

        <div class="nav-section-label">管理</div>
        <a href="/admin/articles" class="nav-item" th:classappend="${activePage == 'articles'} ? 'active'">
            <i class="ph ph-file-text nav-icon"></i> 文章管理
        </a>
        <a href="/admin/demos" class="nav-item" th:classappend="${activePage == 'demos'} ? 'active'">
            <i class="ph ph-rocket-launch nav-icon"></i> 演示管理
        </a>
        <a href="/admin/messages" class="nav-item" th:classappend="${activePage == 'messages'} ? 'active'">
            <i class="ph ph-chats-circle nav-icon"></i> 留言板
        </a>
        <a href="/admin/comments" class="nav-item" th:classappend="${activePage == 'comments'} ? 'active'">
            <i class="ph ph-chat-centered-text nav-icon"></i> 评论管理
        </a>
        <a href="/admin/friend-links" class="nav-item" th:classappend="${activePage == 'friend-links'} ? 'active'">
            <i class="ph ph-link nav-icon"></i> 友情链接
        </a>

        <div class="nav-section-label">设置</div>
        <a href="/admin/settings" class="nav-item" th:classappend="${activePage == 'settings'} ? 'active'">
            <i class="ph ph-paint-brush nav-icon"></i> 主题外观
        </a>
        <a href="/admin/profile" class="nav-item" th:classappend="${activePage == 'profile'} ? 'active'">
            <i class="ph ph-gear-six nav-icon"></i> 基础设置
        </a>
    </div>

    <div class="sidebar-footer">
        <div class="user-menu-wrapper">
            <div class="sidebar-user" id="userMenuBtn">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Li&background=059669&color=fff&font-size=0.4" alt="头像" class="user-avatar" id="sidebarAvatar">
                    <div class="user-name" th:text="${#authentication.name}">管理员</div>
                </div>
                <i class="ph ph-caret-up user-menu-icon" id="userMenuIcon"></i>
            </div>
            <div class="user-dropdown" id="userDropdown">
                <a href="/admin/profile" class="dropdown-item"><i class="ph ph-user"></i> 个人资料</a>
                <div class="dropdown-divider"></div>
                <a href="/logout" class="dropdown-item text-danger"><i class="ph ph-sign-out"></i> 退出登录</a>
            </div>
        </div>
    </div>
</aside>

<!-- 后台公共布局 Fragment -->
<th:block th:fragment="adminLayout(title, activePage)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/js/phosphor-web-loader.js"></script>
    <link rel="stylesheet" href="/css/admin-styles.css">

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/admin/dashboard" class="logo">
                <div class="logo-icon"><i class="ph-bold ph-feather"></i></div>
                <div class="logo-text">
                    <span class="logo-title">ZHIZHU.</span>
                    <span class="logo-sub">工作台</span>
                </div>
            </a>
        </div>

        <div class="nav-body">
            <div class="nav-section-label">创作</div>
            <a href="/admin/dashboard" class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active'">
                <i class="ph ph-squares-four nav-icon"></i> 概览
            </a>
            <a href="/admin/categories" class="nav-item" th:classappend="${activePage == 'categories'} ? 'active'">
                <i class="ph ph-folder-open nav-icon"></i> 专栏与分类
            </a>
            <a href="#" class="nav-item">
                <i class="ph ph-image nav-icon"></i> 我的图床
            </a>

            <div class="nav-section-label">管理</div>
            <a href="/admin/demos" class="nav-item" th:classappend="${activePage == 'demos'} ? 'active'">
                <i class="ph ph-rocket-launch nav-icon"></i> 演示管理
            </a>
            <a href="#" class="nav-item">
                <i class="ph ph-chats-circle nav-icon"></i> 留言板
            </a>
            <a href="/admin/comments" class="nav-item" th:classappend="${activePage == 'comments'} ? 'active'">
                <i class="ph ph-chat-centered-text nav-icon"></i> 评论管理
            </a>
            <a href="/admin/friend-links" class="nav-item" th:classappend="${activePage == 'friend-links'} ? 'active'">
                <i class="ph ph-link nav-icon"></i> 友情链接
            </a>

            <div class="nav-section-label">设置</div>
            <a href="/admin/settings" class="nav-item" th:classappend="${activePage == 'settings'} ? 'active'">
                <i class="ph ph-paint-brush nav-icon"></i> 主题外观
            </a>
            <a href="/admin/settings" class="nav-item" th:classappend="${activePage == 'profile'} ? 'active'">
                <i class="ph ph-gear-six nav-icon"></i> 基础设置
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="user-menu-wrapper">
                <div class="sidebar-user" id="userMenuBtn">
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Li&background=059669&color=fff&font-size=0.4" alt="头像" class="user-avatar" id="sidebarAvatar">
                        <div class="user-name" th:text="${#authentication.name}">管理员</div>
                    </div>
                    <i class="ph ph-caret-up user-menu-icon" id="userMenuIcon"></i>
                </div>
                <div class="user-dropdown" id="userDropdown">
                    <a href="/admin/profile" class="dropdown-item"><i class="ph ph-user"></i> 个人资料</a>
                    <div class="dropdown-divider"></div>
                    <a href="/logout" class="dropdown-item text-danger"><i class="ph ph-sign-out"></i> 退出登录</a>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-wrapper">
        <header class="topbar">
            <div class="topbar-date">
                <i class="ph-light ph-calendar-blank"></i>
                <span id="currentDate">2026 年 4 月 17 日 · 星期五</span>
            </div>

            <div class="topbar-right">
                <button class="topbar-btn" title="查看站点" onclick="window.open('/')"><i class="ph ph-arrow-up-right"></i></button>
                <button class="topbar-btn" title="通知"><i class="ph ph-bell"></i><span class="notif-dot"></span></button>

                <div class="theme-menu-wrapper">
                    <button class="topbar-btn" id="themeSwitchBtn" title="后台配色">
                        <i class="ph ph-dots-three"></i>
                    </button>
                    <div class="theme-dropdown" id="themeDropdown">
                        <div class="theme-dropdown-header">后台配色</div>
                        <div class="theme-options">
                            <button class="theme-option active" data-color="emerald" data-hex="#059669" data-rgb="5, 150, 105">
                                <span class="color-dot" style="background: #059669;"></span> 翡翠绿
                            </button>
                            <button class="theme-option" data-color="orange" data-hex="#EA580C" data-rgb="234, 88, 12">
                                <span class="color-dot" style="background: #EA580C;"></span> 破风橙
                            </button>
                            <button class="theme-option" data-color="blue" data-hex="#2563EB" data-rgb="37, 99, 235">
                                <span class="color-dot" style="background: #2563EB;"></span> 探索蓝
                            </button>
                            <button class="theme-option" data-color="beige" data-hex="#C89F70" data-rgb="200, 159, 112">
                                <span class="color-dot" style="background: #C89F70;"></span> 岁月黄
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="content">
            <!-- 页面内容将插入这里 -->
            <th:block th:replace="${content}"></th:block>
        </div>
    </main>

    <script>
        let myChart;

        document.addEventListener('DOMContentLoaded', function () {
            // 更新日期
            const dateStr = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            document.getElementById('currentDate').innerText = dateStr.replace(/星期/, '· 星期');

            // 用户菜单逻辑
            const userMenuBtn = document.getElementById('userMenuBtn');
            const userDropdown = document.getElementById('userDropdown');
            const userMenuIcon = document.getElementById('userMenuIcon');

            const themeSwitchBtn = document.getElementById('themeSwitchBtn');
            const themeDropdown = document.getElementById('themeDropdown');

            userMenuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                themeDropdown.classList.remove('show');
                userDropdown.classList.toggle('show');
                userMenuIcon.classList.toggle('menu-open-icon');
            });

            themeSwitchBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                userDropdown.classList.remove('show');
                userMenuIcon.classList.remove('menu-open-icon');
                themeDropdown.classList.toggle('show');
            });

            document.addEventListener('click', (e) => {
                if (!userMenuBtn.contains(e.target) && !userDropdown.contains(e.target)) {
                    userDropdown.classList.remove('show');
                    userMenuIcon.classList.remove('menu-open-icon');
                }
                if (!themeSwitchBtn.contains(e.target) && !themeDropdown.contains(e.target)) {
                    themeDropdown.classList.remove('show');
                }
            });

            // 主题切换逻辑
            const themeOptions = document.querySelectorAll('.theme-option');
            themeOptions.forEach(option => {
                option.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const targetTheme = this.getAttribute('data-color');

                    // 调用公共的主题切换函数（会自动保存和应用）
                    switchThemeColor(targetTheme);

                    themeDropdown.classList.remove('show');
                });
            });
        });
    </script>
</th:block>

</body>
</html>
