<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签管理 - puber-blog后台</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .table tbody tr:hover {
            background-color: #f1f3f5;
        }
        .action-buttons .btn {
            margin-right: 0.25rem;
        }
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .tag-badge {
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin/dashboard">
                <i class="bi bi-house-fill"></i> puber-blog后台
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/dashboard">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/categories">
                            <i class="bi bi-folder-fill"></i> 分类管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/tags">
                            <i class="bi bi-tags-fill"></i> 标签管理
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> admin
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/perform_logout">
                                <i class="bi bi-box-arrow-right"></i> 退出登录
                            </a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="bi bi-tags-fill"></i> 标签列表
                        </h5>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#tagModal" onclick="openCreateModal()">
                            <i class="bi bi-plus-circle-fill"></i> 新增标签
                        </button>
                    </div>
                    <div class="card-body">
                        <!-- 加载提示 -->
                        <div id="loadingSpinner" class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                        </div>

                        <!-- 标签表格 -->
                        <table class="table table-hover" id="tagTable" style="display: none;">
                            <thead>
                                <tr>
                                    <th width="50">ID</th>
                                    <th width="150">标签名称</th>
                                    <th width="150">别名（Slug）</th>
                                    <th width="100">文章数</th>
                                    <th width="150">创建时间</th>
                                    <th width="150">操作</th>
                                </tr>
                            </thead>
                            <tbody id="tagTableBody">
                                <!-- 动态填充 -->
                            </tbody>
                        </table>

                        <!-- 空数据提示 -->
                        <div id="emptyMessage" class="text-center py-4" style="display: none;">
                            <i class="bi bi-inbox" style="font-size: 3rem; color: #ccc;"></i>
                            <p class="text-muted mt-2">暂无标签数据</p>
                        </div>

                        <!-- 标签云展示 -->
                        <div class="mt-4" id="tagCloudSection" style="display: none;">
                            <h6 class="mb-3"><i class="bi bi-cloud"></i> 标签云</h6>
                            <div class="tag-cloud" id="tagCloud">
                                <!-- 动态填充 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑标签模态框 -->
    <div class="modal fade" id="tagModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增标签</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="tagForm">
                        <input type="hidden" id="tagId">

                        <div class="mb-3">
                            <label for="tagName" class="form-label">标签名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="tagName" required>
                            <div class="form-text">标签名称不能重复</div>
                        </div>

                        <div class="mb-3">
                            <label for="tagSlug" class="form-label">别名（Slug）</label>
                            <input type="text" class="form-control" id="tagSlug">
                            <div class="form-text">如果不填写，系统会自动根据名称生成</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveTag()">
                        <i class="bi bi-check-circle-fill"></i> 保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 删除确认对话框 -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-exclamation-triangle-fill"></i> 删除确认
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>确定要删除标签 <strong id="deleteTagName"></strong> 吗？</p>
                    <p class="text-danger"><small>注意：如果该标签下有文章，将无法删除</small></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">
                        <i class="bi bi-trash-fill"></i> 确认删除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 自定义脚本 -->
    <script>
        let currentTagId = null;
        let deleteTagId = null;

        // 页面加载完成后获取标签列表
        document.addEventListener('DOMContentLoaded', function() {
            loadTags();
        });

        // 加载标签列表
        function loadTags() {
            fetch('/api/admin/tags')
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200 && data.data) {
                        renderTagTable(data.data);
                        renderTagCloud(data.data);
                    } else {
                        showError(data.message || '加载标签列表失败');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showError('网络请求失败');
                });
        }

        // 渲染标签表格
        function renderTagTable(tags) {
            const tbody = document.getElementById('tagTableBody');
            const spinner = document.getElementById('loadingSpinner');
            const table = document.getElementById('tagTable');
            const emptyMsg = document.getElementById('emptyMessage');
            const cloudSection = document.getElementById('tagCloudSection');

            spinner.style.display = 'none';

            if (tags.length === 0) {
                table.style.display = 'none';
                cloudSection.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }

            table.style.display = 'table';
            cloudSection.style.display = 'block';
            emptyMsg.style.display = 'none';

            tbody.innerHTML = tags.map(tag => `
                <tr>
                    <td>${tag.id}</td>
                    <td>${tag.name}</td>
                    <td><code>${tag.slug}</code></td>
                    <td>
                        <span class="badge bg-info">${tag.articleCount}</span>
                    </td>
                    <td>${formatDate(tag.createdAt)}</td>
                    <td class="action-buttons">
                        <button class="btn btn-sm btn-warning" onclick="openEditModal(${tag.id})">
                            <i class="bi bi-pencil-fill"></i> 编辑
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="openDeleteModal(${tag.id}, '${tag.name}', ${tag.articleCount})">
                            <i class="bi bi-trash-fill"></i> 删除
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 渲染标签云
        function renderTagCloud(tags) {
            const cloud = document.getElementById('tagCloud');

            if (tags.length === 0) {
                return;
            }

            // 根据文章数量计算标签大小
            const maxCount = Math.max(...tags.map(t => t.articleCount));

            cloud.innerHTML = tags.map(tag => {
                // 根据文章数量调整大小
                let badgeClass = 'bg-secondary';
                if (tag.articleCount > maxCount * 0.7) {
                    badgeClass = 'bg-primary';
                } else if (tag.articleCount > maxCount * 0.4) {
                    badgeClass = 'bg-info';
                } else if (tag.articleCount > 0) {
                    badgeClass = 'bg-success';
                }

                return `<span class="badge ${badgeClass} tag-badge">${tag.name} (${tag.articleCount})</span>`;
            }).join('');
        }

        // 打开新增标签模态框
        function openCreateModal() {
            currentTagId = null;
            document.getElementById('modalTitle').textContent = '新增标签';
            document.getElementById('tagForm').reset();
            document.getElementById('tagId').value = '';
        }

        // 打开编辑标签模态框
        function openEditModal(id) {
            currentTagId = id;
            document.getElementById('modalTitle').textContent = '编辑标签';

            // 获取标签详情
            fetch(`/api/admin/tags/${id}`)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200 && data.data) {
                        const tag = data.data;
                        document.getElementById('tagId').value = tag.id;
                        document.getElementById('tagName').value = tag.name;
                        document.getElementById('tagSlug').value = tag.slug;

                        // 显示模态框
                        const modal = new bootstrap.Modal(document.getElementById('tagModal'));
                        modal.show();
                    } else {
                        showError(data.message || '获取标签详情失败');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showError('网络请求失败');
                });
        }

        // 保存标签（新增或编辑）
        function saveTag() {
            const name = document.getElementById('tagName').value.trim();
            const slug = document.getElementById('tagSlug').value.trim();

            if (!name) {
                showError('标签名称不能为空');
                return;
            }

            const data = {
                name: name,
                slug: slug
            };

            const url = currentTagId
                ? `/api/admin/tags/${currentTagId}`
                : '/api/admin/tags';
            const method = currentTagId ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
                .then(response => response.json())
                .then(result => {
                    if (result.code === 200) {
                        // 关闭模态框
                        bootstrap.Modal.getInstance(document.getElementById('tagModal')).hide();
                        // 重新加载列表
                        loadTags();
                        showSuccess(currentTagId ? '标签更新成功' : '标签创建成功');
                    } else {
                        showError(result.message || '保存失败');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showError('网络请求失败');
                });
        }

        // 打开删除确认对话框
        function openDeleteModal(id, name, articleCount) {
            if (articleCount > 0) {
                showError(`该标签下有${articleCount}篇文章，无法删除`);
                return;
            }

            deleteTagId = id;
            document.getElementById('deleteTagName').textContent = name;

            const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
            modal.show();
        }

        // 确认删除
        function confirmDelete() {
            fetch(`/api/admin/tags/${deleteTagId}`, {
                method: 'DELETE'
            })
                .then(response => response.json())
                .then(result => {
                    if (result.code === 200) {
                        // 关闭模态框
                        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                        // 重新加载列表
                        loadTags();
                        showSuccess('标签删除成功');
                    } else {
                        showError(result.message || '删除失败');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showError('网络请求失败');
                });
        }

        // 格式化日期
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 显示成功提示
        function showSuccess(message) {
            alert(message); // 后续可替换为更优雅的Toast提示
        }

        // 显示错误提示
        function showError(message) {
            alert('错误：' + message); // 后续可替换为更优雅的Toast提示
        }
    </script>
</body>
</html>
