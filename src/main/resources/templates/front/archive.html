<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'文章归档 - ' + ${siteName}">文章归档</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- 自定义样式 -->
    <link href="/css/front.css" rel="stylesheet">

    <!-- SEO Meta -->
    <meta name="description" th:content="'查看所有已发布文章的归档 - ' + ${siteName}">
</head>
<body>

<!-- 导航栏 -->
<div th:replace="~{front/fragments :: navbar}"></div>

<!-- 主内容区 -->
<div class="container mt-4">
    <div class="row">
        <!-- 归档内容 -->
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h4><i class="bi bi-calendar3"></i> 文章归档</h4>
                </div>
                <div class="card-body archive-container">
                    <!-- 按年份分组 -->
                    <div th:each="year : ${archive.keySet()}">
                        <div class="archive-year" th:text="${year + '年'}">2026年</div>

                        <!-- 按月份分组 -->
                        <div th:each="month : ${archive.get(year).keySet()}">
                            <div class="archive-month">
                                <div class="archive-month-title" th:text="${month + '月'}">4月</div>

                                <!-- 文章列表 -->
                                <ul class="archive-article-list">
                                    <li th:each="article : ${archive.get(year).get(month)}">
                                        <a th:href="@{/article/{slug}(slug=${article.slug})}"
                                           th:text="${article.title}">文章标题</a>
                                        <small class="text-muted ms-2"
                                               th:text="${#temporals.format(article.publishedAt, 'MM-dd')}">04-13</small>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <!-- 空数据提示 -->
                    <div th:if="${#lists.isEmpty(archive.keySet())}" th:replace="~{front/fragments :: empty-state('暂无文章')}"></div>
                </div>
            </div>
        </div>

        <!-- 侧边栏 -->
        <div class="col-lg-4">
            <!-- 归档统计 -->
            <div class="card sidebar-card">
                <div class="card-header">
                    <i class="bi bi-bar-chart"></i> 统计
                </div>
                <div class="card-body">
                    <p class="small">
                        共计 <strong th:text="${totalArticles}">0</strong> 篇文章
                    </p>
                </div>
            </div>

            <!-- 分类列表 -->
            <div class="card sidebar-card" th:if="${categories != null and !#lists.isEmpty(categories)}">
                <div class="card-header">
                    <i class="bi bi-folder"></i> 分类
                </div>
                <div class="card-body">
                    <ul class="list-unstyled sidebar-article-list">
                        <li th:each="category : ${categories}">
                            <a th:href="@{/category/{slug}(slug=${category.slug})}">
                                <span th:text="${category.name}">分类名</span>
                                <span class="badge bg-primary float-end" th:text="${category.articleCount}">0</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 标签云 -->
            <div class="card sidebar-card" th:if="${tags != null and !#lists.isEmpty(tags)}">
                <div class="card-header">
                    <i class="bi bi-tags"></i> 标签
                </div>
                <div class="card-body">
                    <div class="tag-cloud">
                        <a th:each="tag : ${tags}"
                           class="tag-cloud-item"
                           th:href="@{/tag/{slug}(slug=${tag.slug})}"
                           th:text="${tag.name}">标签名</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<div th:replace="~{front/fragments :: footer}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
