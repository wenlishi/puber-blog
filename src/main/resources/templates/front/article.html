<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${article.title + ' - ' + siteName}">文章详情</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- 自定义样式 -->
    <link href="/css/front.css" rel="stylesheet">

    <!-- Highlight.js for code syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" rel="stylesheet">

    <!-- SEO Meta -->
    <meta name="description" th:content="${article.summary}">
    <meta name="keywords" th:content="${article.tagNames}">

    <!-- Open Graph -->
    <meta property="og:title" th:content="${article.title}">
    <meta property="og:description" th:content="${article.summary}">
    <meta property="og:image" th:if="${article.coverImage != null}" th:content="${article.coverImage}">
</head>
<body>

<!-- 导航栏 -->
<div th:replace="~{front/fragments :: navbar}"></div>

<!-- 主内容区 -->
<div class="container mt-4">
    <div class="row">
        <!-- 文章内容 -->
        <div class="col-lg-9">
            <!-- 封面图 -->
            <img th:if="${article.coverImage != null and article.coverImage != ''}"
                 class="article-cover"
                 th:src="${article.coverImage}"
                 alt="文章封面">

            <!-- 文章标题 -->
            <h1 class="article-title">
                <span th:if="${article.isTop}" class="badge bg-warning text-dark">
                    <i class="bi bi-pin-angle-fill"></i> 置顶
                </span>
                <span th:text="${article.title}">文章标题</span>
            </h1>

            <!-- 元信息 -->
            <div class="article-meta-info">
                <div class="row">
                    <div class="col-md-6">
                        <span th:if="${article.author != null}">
                            <i class="bi bi-person-circle"></i>
                            <span th:text="${article.author.nickname ?: article.author.username}">作者</span>
                        </span>
                        <span class="ms-3" th:if="${article.publishedAt != null}">
                            <i class="bi bi-calendar"></i>
                            <span th:text="${#temporals.format(article.publishedAt, 'yyyy-MM-dd HH:mm')}">发布时间</span>
                        </span>
                    </div>
                    <div class="col-md-6 text-end">
                        <span class="me-3">
                            <i class="bi bi-eye"></i>
                            <span th:text="${article.viewCount} + ' 次浏览'">浏览量</span>
                        </span>
                        <span th:if="${article.isCommentEnabled}">
                            <i class="bi bi-chat-dots"></i>
                            <span th:text="${article.commentCount} + ' 条评论'">评论数</span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- 分类和标签 -->
            <div class="mb-4">
                <span th:if="${article.category != null}">
                    <a class="badge bg-primary text-decoration-none me-2"
                       th:href="@{/category/{slug}(slug=${article.category.slug})}"
                       th:text="${article.category.name}">分类</a>
                </span>
                <span th:if="${article.tags != null and !#lists.isEmpty(article.tags)}">
                    <a th:each="tag : ${article.tags}"
                       class="badge bg-secondary text-decoration-none me-1"
                       th:href="@{/tag/{slug}(slug=${tag.slug})}"
                       th:text="${tag.name}">标签</a>
                </span>
            </div>

            <!-- 文章内容 -->
            <div class="article-content" th:utext="${article.contentHtml}">
                <!-- Markdown渲染后的HTML内容 -->
            </div>

            <!-- 版权声明 -->
            <div class="alert alert-light mt-4">
                <p class="small text-muted">
                    本文由 <strong th:text="${article.author.nickname ?: article.author.username}">作者</strong> 创作，
                    发布于 <span th:text="${#temporals.format(article.publishedAt, 'yyyy年MM月dd日')}">发布时间</span>。
                    转载请注明出处。
                </p>
            </div>

            <!-- 评论区域 -->
            <div class="comments-section mt-4" th:if="${article.isCommentEnabled}">
                <h3 class="comments-title">
                    <i class="bi bi-chat-dots-fill"></i>
                    评论 <span class="badge bg-secondary" th:text="${article.commentCount}">0</span>
                </h3>

                <!-- 评论列表容器 -->
                <div id="comments-list-container" class="comments-list">
                    <!-- 评论列表将通过JavaScript动态加载 -->
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>

                <!-- 评论表单 -->
                <div class="comment-form-container mt-4">
                    <h4 class="comment-form-title">
                        <i class="bi bi-pencil-fill"></i> 发表评论
                    </h4>

                    <!-- 提示信息 -->
                    <div class="alert alert-info">
                        <small>
                            <i class="bi bi-info-circle-fill"></i>
                            您的评论将在审核后显示。邮箱地址不会被公开。
                        </small>
                    </div>

                    <form id="comment-form" class="comment-form">
                        <input type="hidden" id="article-id" th:value="${article.id}">
                        <input type="hidden" id="parent-id" value="">
                        <input type="hidden" id="reply-to-id" value="">
                        <input type="hidden" id="reply-to-nickname" value="">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nickname" class="form-label">昵称 *</label>
                                <input type="text" class="form-control" id="nickname" name="nickname" required placeholder="您的昵称">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">邮箱 *</label>
                                <input type="email" class="form-control" id="email" name="email" required placeholder="your@example.com">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="website" class="form-label">网站（可选）</label>
                            <input type="url" class="form-control" id="website" name="website" placeholder="https://your-site.com">
                        </div>

                        <div class="mb-3">
                            <label for="content" class="form-label">评论内容 *</label>
                            <textarea class="form-control" id="content" name="content" rows="4" required placeholder="写下您的想法..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <div id="reply-info" class="text-muted small" style="display: none;">
                                <i class="bi bi-reply-fill"></i>
                                正在回复 <span id="reply-target-nickname"></span>
                                <button type="button" class="btn btn-sm btn-outline-secondary ms-2" id="cancel-reply-btn">
                                    取消回复
                                </button>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-send-fill"></i> 提交评论
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 评论功能未开启提示 -->
            <div class="alert alert-secondary mt-4" th:unless="${article.isCommentEnabled}">
                <p class="text-muted">
                    <i class="bi bi-chat-dots"></i>
                    本文评论功能已关闭。
                </p>
            </div>
        </div>

        <!-- 侧边栏 -->
        <div class="col-lg-3">
            <!-- 作者信息 -->
            <div class="card sidebar-card" th:if="${article.author != null}">
                <div class="card-header">
                    <i class="bi bi-person-circle"></i> 作者
                </div>
                <div class="card-body text-center">
                    <img th:if="${article.author.avatar != null and article.author.avatar != ''}"
                         th:src="${article.author.avatar}"
                         alt="作者头像"
                         class="rounded-circle mb-2"
                         style="width: 80px; height: 80px;">
                    <h5 th:text="${article.author.nickname != null ? article.author.nickname : article.author.username}">作者名</h5>
                    <p class="small text-muted" th:if="${article.author.bio != null and article.author.bio != ''}" th:text="${article.author.bio}">
                        作者简介
                    </p>
                </div>
            </div>

            <!-- 文章目录 -->
            <div class="card sidebar-card" id="toc-container">
                <div class="card-header">
                    <i class="bi bi-list-ul"></i> 文章目录
                </div>
                <div class="card-body">
                    <nav id="toc-nav" class="toc-nav">
                        <!-- 目录内容由JavaScript动态生成 -->
                    </nav>
                </div>
            </div>

            <!-- 分类列表 -->
            <div class="card sidebar-card" th:if="${categories != null and !#lists.isEmpty(categories)}">
                <div class="card-header">
                    <i class="bi bi-folder"></i> 分类
                </div>
                <div class="card-body">
                    <ul class="list-unstyled sidebar-article-list">
                        <li th:each="category : ${categories}">
                            <a th:href="@{/category/{slug}(slug=${category.slug})}">
                                <span th:text="${category.name}">分类名</span>
                                <span class="badge bg-primary float-end" th:text="${category.articleCount}">0</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 标签云 -->
            <div class="card sidebar-card" th:if="${tags != null and !#lists.isEmpty(tags)}">
                <div class="card-header">
                    <i class="bi bi-tags"></i> 标签
                </div>
                <div class="card-body">
                    <div class="tag-cloud">
                        <a th:each="tag : ${tags}"
                           class="tag-cloud-item"
                           th:href="@{/tag/{slug}(slug=${tag.slug})}"
                           th:text="${tag.name}">标签名</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<div th:replace="~{front/fragments :: footer}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Highlight.js for code syntax highlighting -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- 文章目录导航 -->
<script src="/js/article-toc.js"></script>

<!-- 评论交互逻辑 -->
<script th:if="${article.isCommentEnabled}" src="/js/article-comments.js"></script>

<!-- 代码高亮初始化 -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('pre code').forEach((block) => {
        hljs.highlightElement(block);
    });
});
</script>

</body>
</html>
