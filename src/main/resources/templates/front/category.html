<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category.name + ' - ' + siteName}">分类文章</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- 自定义样式 -->
    <link href="/css/front.css" rel="stylesheet">

    <!-- SEO Meta -->
    <meta name="description" th:content="${category.description ?: '查看分类下的所有文章'}">
</head>
<body>

<!-- 导航栏 -->
<div th:replace="~{front/fragments :: navbar}"></div>

<!-- 主内容区 -->
<div class="container mt-4">
    <!-- 分类信息 -->
    <div class="card mb-4">
        <div class="card-body">
            <h2 class="card-title">
                <i class="bi bi-folder"></i>
                <span th:text="${category.name}">分类名称</span>
            </h2>
            <p class="card-text text-muted" th:if="${category.description != null}" th:text="${category.description}">
                分类描述
            </p>
        </div>
    </div>

    <div class="row">
        <!-- 文章列表 -->
        <div class="col-lg-8">
            <div class="row">
                <!-- 文章卡片列表 -->
                <div th:each="article : ${articles.content}" class="col-md-6 mb-4">
                    <div th:replace="~{front/fragments :: article-card(${article})}"></div>
                </div>
            </div>

            <!-- 空数据提示 -->
            <div th:if="${articles.totalElements == 0}" th:replace="~{front/fragments :: empty-state('该分类下暂无文章')}"></div>

            <!-- 分页导航 -->
            <div th:if="${articles.totalPages > 1}" class="mt-4">
                <div th:replace="~{front/fragments :: pagination(${currentPage}, ${totalPages}, '/category/{slug}(slug=${category.slug})')}"></div>
            </div>
        </div>

        <!-- 侧边栏 -->
        <div class="col-lg-4">
            <!-- 其他分类 -->
            <div class="card sidebar-card" th:if="${categories != null and !#lists.isEmpty(categories)}">
                <div class="card-header">
                    <i class="bi bi-folder"></i> 其他分类
                </div>
                <div class="card-body">
                    <ul class="list-unstyled sidebar-article-list">
                        <li th:each="cat : ${categories}" th:if="${cat.id != category.id}">
                            <a th:href="@{/category/{slug}(slug=${cat.slug})}">
                                <span th:text="${cat.name}">分类名</span>
                                <span class="badge bg-primary float-end" th:text="${cat.articleCount}">0</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 标签云 -->
            <div class="card sidebar-card" th:if="${tags != null and !#lists.isEmpty(tags)}">
                <div class="card-header">
                    <i class="bi bi-tags"></i> 标签
                </div>
                <div class="card-body">
                    <div class="tag-cloud">
                        <a th:each="tag : ${tags}"
                           class="tag-cloud-item"
                           th:href="@{/tag/{slug}(slug=${tag.slug})}"
                           th:text="${tag.name}">标签名</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<div th:replace="~{front/fragments :: footer}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
