<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - puber-blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">puber-blog</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4 class="text-center">管理员登录</h4>
                    </div>
                    <div class="card-body">
                        <!-- 错误提示 -->
                        <div th:if="${param.error}" class="alert alert-danger">
                            用户名或密码错误
                        </div>
                        <!-- 登出提示 -->
                        <div th:if="${param.logout}" class="alert alert-success">
                            已成功登出
                        </div>
                        <!-- Session 过期提示 -->
                        <div th:if="${param.expired}" class="alert alert-warning">
                            Session 已过期，请重新登录
                        </div>

                        <form th:action="@{/perform_login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">登录</button>
                            </div>
                        </form>

                        <hr>
                        <div class="alert alert-info">
                            <p><strong>默认管理员账号：</strong></p>
                            <ul>
                                <li>用户名：admin</li>
                                <li>密码：admin123</li>
                            </ul>
                            <p class="mb-0 small">注意：请在数据库初始化后立即修改默认密码</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
