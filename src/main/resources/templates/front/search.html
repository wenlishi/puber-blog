<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'搜索: ' + ${keyword} + ' - ' + ${siteName}">搜索结果</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- 自定义样式 -->
    <link href="/css/front.css" rel="stylesheet">

    <!-- SEO Meta -->
    <meta name="description" th:content="'搜索关键词: ' + ${keyword}">
</head>
<body>

<!-- 导航栏 -->
<div th:replace="~{front/fragments :: navbar}"></div>

<!-- 主内容区 -->
<div class="container mt-4">
    <!-- 搜索信息 -->
    <div class="search-result-info">
        <h4>
            <i class="bi bi-search"></i> 搜索结果
        </h4>
        <p class="mb-0">
            关键词: <strong class="search-highlight" th:text="${keyword}">搜索关键词</strong>
            <span th:if="${totalElements != null}">
                - 共找到 <strong th:text="${totalElements}">0</strong> 篇文章
            </span>
        </p>
    </div>

    <div class="row">
        <!-- 搜索结果 -->
        <div class="col-lg-8">
            <div class="row">
                <!-- 文章卡片列表 -->
                <div th:each="article : ${articles.content}" class="col-md-6 mb-4">
                    <div th:replace="~{front/fragments :: article-card(${article})}"></div>
                </div>
            </div>

            <!-- 空数据提示 -->
            <div th:if="${keyword != null and keyword != '' and articles.totalElements == 0}">
                <div class="text-center py-5">
                    <i class="bi bi-search" style="font-size: 3rem; color: #ccc;"></i>
                    <p class="text-muted mt-3">未找到包含 "<strong th:text="${keyword}">关键词</strong>" 的文章</p>
                    <p class="small text-muted">建议尝试其他关键词</p>
                </div>
            </div>

            <!-- 无搜索关键词提示 -->
            <div th:if="${keyword == null or keyword == ''}" th:replace="~{front/fragments :: empty-state('请输入搜索关键词')}"></div>

            <!-- 分页导航 -->
            <div th:if="${keyword != null and keyword != '' and articles.totalPages > 1}" class="mt-4">
                <div th:replace="~{front/fragments :: pagination(${currentPage}, ${totalPages}, '/search(keyword=${keyword})')}"></div>
            </div>
        </div>

        <!-- 侧边栏 -->
        <div class="col-lg-4">
            <!-- 分类列表 -->
            <div class="card sidebar-card" th:if="${categories != null and !#lists.isEmpty(categories)}">
                <div class="card-header">
                    <i class="bi bi-folder"></i> 分类
                </div>
                <div class="card-body">
                    <ul class="list-unstyled sidebar-article-list">
                        <li th:each="category : ${categories}">
                            <a th:href="@{/category/{slug}(slug=${category.slug})}">
                                <span th:text="${category.name}">分类名</span>
                                <span class="badge bg-primary float-end" th:text="${category.articleCount}">0</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 标签云 -->
            <div class="card sidebar-card" th:if="${tags != null and !#lists.isEmpty(tags)}">
                <div class="card-header">
                    <i class="bi bi-tags"></i> 标签
                </div>
                <div class="card-body">
                    <div class="tag-cloud">
                        <a th:each="tag : ${tags}"
                           class="tag-cloud-item"
                           th:href="@{/tag/{slug}(slug=${tag.slug})}"
                           th:text="${tag.name}">标签名</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<div th:replace="~{front/fragments :: footer}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
