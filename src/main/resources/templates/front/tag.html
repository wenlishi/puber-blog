<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tag.name + ' - ' + siteName}">标签文章</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- 自定义样式 -->
    <link href="/css/front.css" rel="stylesheet">

    <!-- SEO Meta -->
    <meta name="description" th:content="'查看标签 ' + ${tag.name} + ' 下的所有文章'">
</head>
<body>

<!-- 导航栏 -->
<div th:replace="~{front/fragments :: navbar}"></div>

<!-- 主内容区 -->
<div class="container mt-4">
    <!-- 标签信息 -->
    <div class="card mb-4">
        <div class="card-body">
            <h2 class="card-title">
                <i class="bi bi-tags"></i>
                <span th:text="${tag.name}">标签名称</span>
            </h2>
        </div>
    </div>

    <div class="row">
        <!-- 文章列表 -->
        <div class="col-lg-8">
            <div class="row">
                <!-- 文章卡片列表 -->
                <div th:each="article : ${articles.content}" class="col-md-6 mb-4">
                    <div th:replace="~{front/fragments :: article-card(${article})}"></div>
                </div>
            </div>

            <!-- 空数据提示 -->
            <div th:if="${articles.totalElements == 0}" th:replace="~{front/fragments :: empty-state('该标签下暂无文章')}"></div>

            <!-- 分页导航 -->
            <div th:if="${articles.totalPages > 1}" class="mt-4">
                <div th:replace="~{front/fragments :: pagination(${currentPage}, ${totalPages}, '/tag/{slug}(slug=${tag.slug})')}"></div>
            </div>
        </div>

        <!-- 侧边栏 -->
        <div class="col-lg-4">
            <!-- 分类列表 -->
            <div class="card sidebar-card" th:if="${categories != null and !categories.isEmpty()}">
                <div class="card-header">
                    <i class="bi bi-folder"></i> 分类
                </div>
                <div class="card-body">
                    <ul class="list-unstyled sidebar-article-list">
                        <li th:each="category : ${categories}">
                            <a th:href="@{/category/{slug}(slug=${category.slug})}">
                                <span th:text="${category.name}">分类名</span>
                                <span class="badge bg-primary float-end" th:text="${category.articleCount}">0</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 其他标签 -->
            <div class="card sidebar-card" th:if="${tags != null and !tags.isEmpty()}">
                <div class="card-header">
                    <i class="bi bi-tags"></i> 其他标签
                </div>
                <div class="card-body">
                    <div class="tag-cloud">
                        <a th:each="t : ${tags}" th:if="${t.id != tag.id}"
                           class="tag-cloud-item"
                           th:href="@{/tag/{slug}(slug=${t.slug})}"
                           th:text="${t.name}">标签名</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<div th:replace="~{front/fragments :: footer}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
